<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#2563eb" />
<title>Chat — Lingua</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="ico" onclick="history.back()">‹</button>
    <h1 id="personaTitle">AI Companion</h1>
    <button class="ico" id="changeBtn" title="Switch personality">⇆</button>
  </header>

  <main class="page" id="pickerPage">
    <h2 style="margin:0 0 6px;color:var(--blue-900);font-size:22px">Pick your companion</h2>
    <p class="muted" style="margin-bottom:14px">Each one talks a little differently.</p>
    <div id="personas"></div>
    <button class="btn" id="startBtn" disabled>Start chatting</button>
  </main>

  <main class="chat-wrap" id="chatPage" style="display:none">
    <div class="chat-messages" id="messages"></div>
    <form class="chat-input" id="chatForm">
      <button type="button" id="micBtn" class="mic" title="Voice input">🎤</button>
      <input id="msgInput" placeholder="Type a message…" autocomplete="off" />
      <button type="submit" title="Send">➤</button>
    </form>
  </main>

  <nav class="tabbar" id="tabbar"></nav>
</div>

<script type="module">
  import {
    $, $$, requireProfile, toast, PERSONALITIES, aiChat, speak, createRecognizer,
    getChatHistory, saveChatHistory, logDailyGoal, bottomNav
  } from "./app.js";

  document.getElementById("tabbar").outerHTML = bottomNav("chat");
  requireProfile();

  let personality = localStorage.getItem("persona") || null;
  let history = [];

  const personasEl = $("#personas");
  Object.entries(PERSONALITIES).forEach(([key,p])=>{
    const div = document.createElement("div");
    div.className = "persona"+(key===personality?" active":"");
    div.innerHTML = `<div class="avi">${p.emoji}</div><div><h4>${p.name}</h4><p>${p.desc}</p></div>`;
    div.onclick = ()=>{
      $$(".persona").forEach(x=>x.classList.remove("active"));
      div.classList.add("active");
      personality = key;
      $("#startBtn").disabled = false;
    };
    personasEl.appendChild(div);
  });
  if(personality) $("#startBtn").disabled = false;

  $("#startBtn").onclick = startChat;
  $("#changeBtn").onclick = ()=>{ $("#chatPage").style.display="none"; $("#pickerPage").style.display="block"; };
  if(personality) startChat();

  function startChat(){
    localStorage.setItem("persona", personality);
    const p = PERSONALITIES[personality];
    $("#personaTitle").textContent = p.emoji+" "+p.name;
    $("#pickerPage").style.display = "none";
    $("#chatPage").style.display = "flex";

    history = getChatHistory(personality);
    const msgs = $("#messages"); msgs.innerHTML = "";
    history.forEach(m=>renderMsg(m.role,m.content));

    if(history.length===0){
      const opener = openerFor(personality);
      renderMsg("assistant",opener);
      history.push({role:"assistant",content:opener});
      saveChatHistory(personality,history);
      speak(opener);
    }
  }

  function openerFor(key){
    switch(key){
      case "friendly": return "Hey! I'm Lia 💖 How was your day so far?";
      case "teacher": return "Hello, I'm Mr. Hayes. Tell me one thing you did today and I'll help you say it better.";
      case "citizenship": return "Welcome! Let's prepare for your citizenship interview. Ready for your first question?";
      case "business": return "Hi, I'm your business mentor. What workplace situation would you like to practice today?";
    }
    return "Hello!";
  }

  function renderMsg(role, content){
    const msgs = $("#messages");
    const div = document.createElement("div");
    div.className = "msg "+(role==="user"?"user":"ai");
    if(role!=="user" && content.includes("Correction:")){
      const [main, ...rest] = content.split(/Correction:/i);
      div.innerHTML = `${esc(main).trim()}<div class="correction"><strong>Correction:</strong>${esc(rest.join("Correction:"))}</div>`;
    } else { div.textContent = content; }
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }
  function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

  function showTyping(){
    const t = document.createElement("div"); t.className="typing"; t.id="typing";
    t.innerHTML="<span></span><span></span><span></span>";
    $("#messages").appendChild(t);
    $("#messages").scrollTop = $("#messages").scrollHeight;
  }
  function hideTyping(){ document.getElementById("typing")?.remove(); }

  $("#chatForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const text = $("#msgInput").value.trim();
    if(!text) return;
    $("#msgInput").value = "";
    await send(text);
  });

  async function send(text){
    renderMsg("user",text);
    history.push({role:"user",content:text});
    logDailyGoal("chat");
    saveChatHistory(personality,history);
    showTyping();
    try{
      const reply = await aiChat(history.slice(-12), personality);
      hideTyping();
      renderMsg("assistant",reply);
      history.push({role:"assistant",content:reply});
      saveChatHistory(personality,history);
      speak(reply.replace(/Correction:.*/is,""));
    }catch(err){
      hideTyping();
      renderMsg("assistant","Sorry, I'm having trouble connecting. The AI endpoint isn't set up yet — finish the Cloudflare Worker step.");
      console.error(err);
    }
  }

  let rec=null,recording=false;
  $("#micBtn").addEventListener("click",()=>{
    if(!rec){
      rec = createRecognizer((text)=>{
        $("#micBtn").classList.remove("recording"); recording=false; send(text);
      }, ()=>{ $("#micBtn").classList.remove("recording"); recording=false; });
      if(!rec){ toast("Voice not supported on this browser"); return; }
    }
    if(recording){ rec.stop(); return; }
    try{ rec.start(); recording=true; $("#micBtn").classList.add("recording"); }catch(e){ toast("Mic in use"); }
  });
</script>
</body>
</html>
