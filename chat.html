<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#2563eb" />
<title>Chat — Lingua</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="ico" onclick="history.back()">‹</button>
    <h1 id="personaTitle">AI Companion</h1>
    <button class="ico" id="changeBtn" title="Switch personality">⇆</button>
  </header>

  <!-- Personality picker -->
  <main class="page" id="pickerPage">
    <h2 style="margin:0 0 6px;color:var(--blue-900);font-size:22px">Pick your companion</h2>
    <p class="muted" style="margin-bottom:14px">Each one talks a little differently.</p>
    <div id="personas"></div>
    <button class="btn" id="startBtn" disabled>Start chatting</button>
  </main>

  <!-- Chat view -->
  <main class="chat-wrap" id="chatPage" style="display:none">
    <div class="chat-messages" id="messages">
      <button class="btn callstart" id="callBtn">📞 Start voice call — tap once, then talk</button>
    </div>
    <form class="chat-input" id="chatForm">
      <button type="button" id="micBtn" class="mic" title="Voice input">🎤</button>
      <input id="msgInput" placeholder="Or type a message…" autocomplete="off" />
      <button type="submit" title="Send">➤</button>
    </form>
  </main>

  <!-- Voice call overlay -->
  <div id="callOverlay" style="display:none">
    <div class="call-card">
      <div class="call-avi" id="callAvi">💖</div>
      <h2 id="callName">Voice call</h2>
      <div class="call-orb" id="callOrb"><div></div><div></div><div></div></div>
      <p class="call-status" id="callStatus">Connecting…</p>
      <p class="call-tip muted" id="callTip">Speak naturally. I'll reply when you pause.</p>
      <button class="btn hangup" id="hangupBtn">📞 End call</button>
    </div>
  </div>

  <nav class="tabbar" id="tabbar"></nav>
</div>

<script type="module">
  import {
    $, $$, requireProfile, toast, PERSONALITIES, aiChat,
    getChatHistory, saveChatHistory, logDailyGoal, bottomNav
  } from "./app.js";

  document.getElementById("tabbar").outerHTML = bottomNav("chat");
  requireProfile();

  let personality = localStorage.getItem("persona") || null;
  let history = [];

  /* personality picker */
  const personasEl = $("#personas");
  Object.entries(PERSONALITIES).forEach(([key,p])=>{
    const div = document.createElement("div");
    div.className = "persona"+(key===personality?" active":"");
    div.innerHTML = `<div class="avi">${p.emoji}</div><div><h4>${p.name}</h4><p>${p.desc}</p></div>`;
    div.onclick = ()=>{
      $$(".persona").forEach(x=>x.classList.remove("active"));
      div.classList.add("active");
      personality = key;
      $("#startBtn").disabled = false;
    };
    personasEl.appendChild(div);
  });
  if(personality) $("#startBtn").disabled = false;
  $("#startBtn").onclick = startChat;
  $("#changeBtn").onclick = ()=>{ endCall(); $("#chatPage").style.display="none"; $("#pickerPage").style.display="block"; };
  if(personality) startChat();

  function startChat(){
    localStorage.setItem("persona", personality);
    const p = PERSONALITIES[personality];
    $("#personaTitle").textContent = p.emoji+" "+p.name;
    $("#pickerPage").style.display = "none";
    $("#chatPage").style.display = "flex";
    history = getChatHistory(personality);
    const msgs = $("#messages");
    // keep the call button at top
    msgs.querySelectorAll(".msg,.typing").forEach(x=>x.remove());
    history.forEach(m=>renderMsg(m.role,m.content));
    if(history.length===0){
      const opener = openerFor(personality);
      renderMsg("assistant",opener);
      history.push({role:"assistant",content:opener});
      saveChatHistory(personality,history);
    }
  }

  function openerFor(key){
    switch(key){
      case "friendly": return "Hey! I'm Lia 💖 Tap the call button — let's just talk.";
      case "teacher": return "Hello, I'm Mr. Hayes. Tap the call button and tell me about your day.";
      case "citizenship": return "Welcome! Tap the call button and I'll quiz you on civics questions.";
      case "business": return "Hi, I'm your business mentor. Tap call and let's practice.";
    }
    return "Hello!";
  }

  function renderMsg(role, content){
    const msgs = $("#messages");
    const div = document.createElement("div");
    div.className = "msg "+(role==="user"?"user":"ai");
    if(role!=="user" && content.includes("Correction:")){
      const [main, ...rest] = content.split(/Correction:/i);
      div.innerHTML = `${esc(main).trim()}<div class="correction"><strong>Correction:</strong>${esc(rest.join("Correction:"))}</div>`;
    } else { div.textContent = content; }
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }
  function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

  function showTyping(){
    const t = document.createElement("div"); t.className="typing"; t.id="typing";
    t.innerHTML="<span></span><span></span><span></span>";
    $("#messages").appendChild(t);
    $("#messages").scrollTop = $("#messages").scrollHeight;
  }
  function hideTyping(){ document.getElementById("typing")?.remove(); }

  /* ---------- TEXT chat ---------- */
  $("#chatForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const text = $("#msgInput").value.trim();
    if(!text) return;
    $("#msgInput").value = "";
    await sendText(text);
  });

  async function sendText(text){
    renderMsg("user",text);
    history.push({role:"user",content:text});
    logDailyGoal("chat");
    saveChatHistory(personality,history);
    showTyping();
    try{
      const reply = await aiChat(history.slice(-12), personality);
      hideTyping();
      renderMsg("assistant",reply);
      history.push({role:"assistant",content:reply});
      saveChatHistory(personality,history);
    }catch(err){
      hideTyping();
      renderMsg("assistant","Sorry, AI not connected.");
    }
  }

  /* single mic-press fallback (one-shot dictation into text box) */
  $("#micBtn").addEventListener("click",()=>{
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ toast("Voice not supported"); return; }
    const r = new SR();
    r.lang="en-US"; r.continuous=false; r.interimResults=false;
    r.onresult=(e)=>{ $("#msgInput").value = e.results[0][0].transcript; };
    try{ r.start(); $("#micBtn").classList.add("recording"); r.onend=()=>$("#micBtn").classList.remove("recording"); }catch(e){}
  });

  /* ============ VOICE CALL MODE ============ */
  let callOn = false;
  let callRec = null;
  let gotResult = false;
  let restartTimer = null;

  $("#callBtn").addEventListener("click", startCall);
  $("#hangupBtn").addEventListener("click", endCall);

  function startCall(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ toast("Voice not supported on this browser"); return; }
    callOn = true;
    const p = PERSONALITIES[personality];
    $("#callAvi").textContent = p.emoji;
    $("#callName").textContent = p.name;
    $("#callOverlay").style.display = "flex";

    // iOS Safari: unlock speech synthesis with a silent utterance triggered by user tap
    try {
      const unlock = new SpeechSynthesisUtterance(" ");
      unlock.volume = 0;
      speechSynthesis.speak(unlock);
    } catch(e){}

    // Greet first
    const greet = history.length > 0
      ? "I'm listening — what's on your mind?"
      : openerFor(personality);
    setStatus("🔊 Speaking…");
    setOrb("speak");
    speakThenListen(greet);
  }

  function endCall(){
    callOn = false;
    clearTimeout(restartTimer);
    try{ callRec && callRec.abort && callRec.abort(); }catch(e){}
    try{ speechSynthesis.cancel(); }catch(e){}
    $("#callOverlay").style.display = "none";
  }

  function setStatus(s){ $("#callStatus").textContent = s; }
  function setOrb(mode){
    const o = $("#callOrb");
    o.className = "call-orb " + mode; // "listen" | "think" | "speak"
  }

  function listenLoop(){
    if(!callOn) return;
    setStatus("🎤 Listening… (speak now)");
    setOrb("listen");
    gotResult = false;

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    callRec = new SR();
    callRec.lang = "en-US";
    callRec.continuous = false;
    callRec.interimResults = false;

    callRec.onresult = (e) => {
      gotResult = true;
      const text = e.results[0][0].transcript.trim();
      if(text) handleUserSpeech(text);
    };
    callRec.onerror = (e) => {
      if(e.error === "no-speech" || e.error === "aborted") return;
      console.log("rec error:", e.error);
    };
    callRec.onend = () => {
      if(!gotResult && callOn){
        restartTimer = setTimeout(()=>{ if(callOn && !speechSynthesis.speaking) listenLoop(); }, 400);
      }
    };
    try { callRec.start(); } catch(e){ console.log("start error:",e); }
  }

  async function handleUserSpeech(text){
    if(!callOn) return;
    setStatus("💭 Thinking…");
    setOrb("think");
    renderMsg("user", text);
    history.push({role:"user", content:text});
    logDailyGoal("chat");
    saveChatHistory(personality, history);

    try {
      const reply = await aiChat(history.slice(-12), personality);
      if(!callOn) return;
      renderMsg("assistant", reply);
      history.push({role:"assistant", content:reply});
      saveChatHistory(personality, history);
      setStatus("🔊 Speaking…");
      setOrb("speak");
      speakThenListen(reply.replace(/Correction:.*/is, ""));
    } catch(e){
      setStatus("⚠️ Connection error — retrying");
      setOrb("listen");
      setTimeout(()=>{ if(callOn) listenLoop(); }, 1500);
    }
  }

  function speakThenListen(text){
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = 0.95; u.pitch = 1.05;
    const voices = speechSynthesis.getVoices();
    const female = voices.find(v=>/female|samantha|google.*us|zira/i.test(v.name) && v.lang.startsWith("en"));
    if(female) u.voice = female;
    u.onend = () => { if(callOn) listenLoop(); };
    u.onerror = () => { if(callOn) listenLoop(); };
    speechSynthesis.speak(u);
    // Fallback: if onend never fires (Safari quirk), force restart after estimated duration
    const estMs = Math.min(text.length * 70, 15000) + 800;
    setTimeout(()=>{ if(callOn && !speechSynthesis.speaking && callRec && !gotResult){ listenLoop(); } }, estMs);
  }
</script>
</body>
</html>
