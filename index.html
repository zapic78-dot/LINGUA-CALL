<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6c63ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LinguaCall">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>LinguaCall — AI Language Tutor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3a;
  --accent:#6c63ff;--accent2:#a78bfa;--green:#22d3a0;--red:#ff5c72;--amber:#fbbf24;
  --text:#f0f0f8;--muted:#8a8aaa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 12px 24px;max-width:520px;margin:0 auto;}
header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 0 10px;}
.logo{font-weight:700;font-size:18px;letter-spacing:-0.3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;}
.profile-tag{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);padding:6px 10px;border-radius:14px;font-size:11px;color:var(--muted);cursor:pointer;}
.profile-tag.hidden{display:none;}
.profile-tag b{color:var(--text);font-weight:600;font-size:12px;}
.status-pill{font-size:10px;color:var(--muted);background:var(--surface);padding:4px 9px;border-radius:10px;border:1px solid var(--border);}
.status-pill.listening{color:var(--green);border-color:rgba(34,211,160,.3);}
.status-pill.active{color:var(--accent2);border-color:rgba(167,139,250,.3);}
.section{width:100%;margin-top:10px;}
.sec-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;padding-left:2px;}
.btn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.btn-grid.three{grid-template-columns:repeat(3,1fr);}
.btn-grid.four{grid-template-columns:repeat(4,1fr);}
.btn-grid.five{grid-template-columns:repeat(5,1fr);}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 8px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;flex-direction:column;text-align:center;}
.btn:hover{background:var(--surface2);}
.btn.selected{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:white;font-weight:600;}
.btn small{display:block;font-size:9px;opacity:.85;font-weight:400;margin-top:1px;}
.tutor-area{display:flex;flex-direction:column;align-items:center;margin:14px 0 8px;}
.avatar-ring{position:relative;width:90px;height:90px;display:flex;align-items:center;justify-content:center;}
.avatar-ring canvas{position:absolute;inset:0;}
.avatar-inner{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;transition:transform .25s;}
.avatar-inner.speaking{animation:pulse 1s ease-in-out infinite;}
.avatar-inner.mic-on{box-shadow:0 0 0 4px rgba(34,211,160,.4);}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.tutor-name{font-weight:600;font-size:14px;margin-top:6px;}
.tutor-sub{font-size:10px;color:var(--muted);}
.stats-row{display:flex;gap:5px;width:100%;margin:6px 0;}
.stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 4px;text-align:center;}
.stat-val{font-size:13px;font-weight:600;color:var(--accent2);}
.stat-name{font-size:9px;color:var(--muted);text-transform:uppercase;}
#waveCanvas{width:100%;height:32px;margin:4px 0;}
.chat-box{width:100%;margin-top:4px;}
.bubble-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.bubble{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:13px;line-height:1.5;}
.bubble.user-bubble{background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(167,139,250,.1));border-color:rgba(108,99,255,.25);}
.native-line{margin-top:5px;padding-top:5px;border-top:1px dashed var(--border);font-size:12px;color:var(--accent2);font-style:italic;}
.native-line:empty{display:none;}
.hidden{display:none!important;}
.correction-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 11px;margin-top:8px;display:none;}
.correction-card.show{display:block;}
.corr-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.corr-label.ok{color:var(--green);}
.corr-label.fix{color:var(--amber);}
.corr-line{font-size:12px;color:var(--muted);margin:2px 0;}
.corr-line.good{color:var(--green);font-weight:500;}
.corr-note{font-size:11px;color:var(--text);margin-top:4px;opacity:.85;}
.trans-bar{width:100%;margin-top:8px;}
.trans-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;}
.trans-label{background:var(--accent);color:white;padding:1px 6px;border-radius:5px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.call-area{width:100%;margin-top:14px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.call-timer{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;}
.call-controls{display:flex;gap:14px;align-items:center;}
.call-btn{width:54px;height:54px;border-radius:50%;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s;font-family:inherit;}
.call-btn.dial{width:66px;height:66px;background:linear-gradient(135deg,var(--green),#1ab38a);color:white;box-shadow:0 6px 20px rgba(34,211,160,.35);font-size:26px;}
.call-btn.dial.end{background:linear-gradient(135deg,var(--red),#e0445a);box-shadow:0 6px 20px rgba(255,92,114,.35);}
.call-btn.side{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.call-btn.side.muted{background:var(--amber);color:#222;}
.call-btn:active{transform:scale(.94);}
.call-label{font-size:10px;color:var(--muted);}
.retry-row{justify-content:center;margin-top:8px;display:none;}
.retry-row.show{display:flex;}
.retry-btn{background:var(--surface2);border:1px solid var(--accent);color:var(--accent2);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--surface2);border:1px solid var(--border);padding:9px 16px;border-radius:10px;font-size:12px;opacity:0;pointer-events:none;transition:all .3s;z-index:100;max-width:90%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
.toast.err{border-color:var(--red);color:var(--red);}
.toast.ok{border-color:var(--green);color:var(--green);}
.modal-overlay{position:fixed;inset:0;background:rgba(5,5,10,.85);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:20px 12px;overflow-y:auto;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;width:100%;max-width:440px;margin:auto;}
.modal h2{font-size:18px;font-weight:600;margin-bottom:4px;}
.modal .sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.modal label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 4px;}
.modal input,.modal select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:9px;font-size:14px;font-family:inherit;}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.modal-actions .btn{flex:1;padding:11px;font-size:13px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2))!important;border:none!important;color:white!important;font-weight:600!important;}
.profile-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.profile-card .info{flex:1;cursor:pointer;}
.profile-card .name{font-weight:600;font-size:14px;}
.profile-card .meta{font-size:10px;color:var(--muted);margin-top:2px;}
.profile-card .del{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px 8px;}
.welcome-big{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.welcome-big .btn{padding:14px;font-size:14px;font-weight:600;}
.mcq-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:8px;}
.mcq-card.hidden{display:none;}
.mcq-q{font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.4;}
.mcq-choices{display:flex;flex-direction:column;gap:6px;}
.mcq-choice{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:9px;font-size:13px;cursor:pointer;text-align:left;font-family:inherit;line-height:1.4;}
.mcq-choice:hover:not(:disabled){border-color:var(--accent);}
.mcq-choice:disabled{cursor:default;}
.mcq-choice.correct{background:rgba(34,211,160,.15);border-color:var(--green);color:var(--green);font-weight:600;}
.mcq-choice.wrong{background:rgba(255,92,114,.15);border-color:var(--red);color:var(--red);}
.mcq-feedback{font-size:12px;margin-top:10px;padding:9px;border-radius:8px;background:var(--surface2);display:none;}
.mcq-feedback.show{display:block;}
.mcq-feedback.ok{color:var(--green);border:1px solid rgba(34,211,160,.3);}
.mcq-feedback.bad{color:var(--red);border:1px solid rgba(255,92,114,.3);}
.mcq-score{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px;}
.mcq-next{margin-top:10px;display:flex;gap:8px;}
.mcq-next.hidden{display:none;}
.typing-dots{display:inline-flex;gap:3px;}
.typing-dots .dot{width:5px;height:5px;border-radius:50%;background:var(--accent2);animation:bounce 1.2s infinite ease-in-out;}
.typing-dots .dot:nth-child(2){animation-delay:.15s;}
.typing-dots .dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.5;}40%{transform:scale(1);opacity:1;}}
/* Install button */
.install-btn{width:100%;margin-top:10px;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#22d3a0,#1ab38a);color:white;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 18px rgba(34,211,160,.35);animation:glow 2.5s ease-in-out infinite;}
.install-btn.hidden{display:none;}
@keyframes glow{0%,100%{box-shadow:0 4px 18px rgba(34,211,160,.35);}50%{box-shadow:0 4px 28px rgba(34,211,160,.6);}}
/* Polish: smoother gradients and depth */
body{background:radial-gradient(ellipse at top, #14141f 0%, #0a0a0f 60%);}
.bubble{box-shadow:0 2px 12px rgba(0,0,0,.25);}
.btn{transition:all .18s cubic-bezier(.4,0,.2,1);}
.btn:active{transform:scale(.96);}
.btn.selected{box-shadow:0 3px 12px rgba(108,99,255,.35);}
.avatar-inner{box-shadow:0 6px 24px rgba(108,99,255,.4);}
.call-btn.dial{transition:transform .2s,box-shadow .2s;}
.call-btn.dial:hover{box-shadow:0 8px 28px rgba(34,211,160,.5);}
</style>
</head>
<body>

<header>
  <div class="logo">LinguaCall</div>
  <div style="display:flex;gap:6px;align-items:center;">
    <div class="profile-tag hidden" id="profileTag" onclick="openProfileMenu()"><span>👤</span><b id="profileTagName">—</b></div>
    <div class="status-pill" id="statusPill">Ready</div>
  </div>
</header>

<div id="setupArea" style="width:100%;">
  <div class="section">
    <div class="sec-label">Topic</div>
    <div class="btn-grid three" id="topicGrid"></div>
  </div>
  <div class="section">
    <div class="sec-label">Sub-topic</div>
    <div class="btn-grid two" id="subtopicGrid"></div>
  </div>
  <div class="section">
    <div class="sec-label">Level</div>
    <div class="btn-grid three">
      <button class="btn selected" data-level="beginner" onclick="selectLevel(this)">🌱 Beginner</button>
      <button class="btn" data-level="intermediate" onclick="selectLevel(this)">🔥 Medium</button>
      <button class="btn" data-level="advanced" onclick="selectLevel(this)">⚡ Advanced</button>
    </div>
  </div>
  <div class="section">
    <div class="sec-label">Nova's Voice</div>
    <div class="btn-grid two">
      <button class="btn" data-voice="man" onclick="selectVoice(this)">👨<small>Man</small></button>
      <button class="btn selected" data-voice="woman" onclick="selectVoice(this)">👩<small>Woman</small></button>
    </div>
  </div>
</div>

<!-- Install button (shows when PWA install is available) -->
<button class="install-btn hidden" id="installBtn" onclick="installApp()">📲  Install LinguaCall on your phone</button>

<div class="tutor-area">
  <div class="avatar-ring">
    <canvas id="ringCanvas" width="90" height="90"></canvas>
    <div class="avatar-inner" id="avatarInner">🤖</div>
  </div>
  <div class="tutor-name">Nova</div>
  <div class="tutor-sub" id="tutorSub">Your AI Language Companion</div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-val" id="statWords">0</div><div class="stat-name">Words</div></div>
  <div class="stat-card"><div class="stat-val" id="statTurns">0</div><div class="stat-name">Turns</div></div>
  <div class="stat-card"><div class="stat-val" id="statTime">0:00</div><div class="stat-name">Time</div></div>
</div>

<canvas id="waveCanvas"></canvas>

<div class="chat-box">
  <div class="bubble-label">Nova</div>
  <div class="bubble" id="tutorBubble">
    <span id="tutorText">Welcome! Pick a topic and tap <strong>Call</strong>.</span>
    <div class="native-line" id="nativeLine"></div>
  </div>
  <div class="bubble-label hidden" id="userLabel" style="margin-top:8px;">You</div>
  <div class="bubble user-bubble hidden" id="userBubble"><span id="userText"></span></div>
  <div class="correction-card" id="correctionCard">
    <div class="corr-label ok" id="corrLabel">Nice!</div>
    <div class="corr-line" id="corrOriginal"></div>
    <div class="corr-line good hidden" id="corrFixed"></div>
    <div class="corr-note" id="corrNote"></div>
  </div>
  <div class="mcq-card hidden" id="mcqCard">
    <div class="mcq-score">
      <span>Question <b id="mcqQNum">1</b> of <b id="mcqQTotal">10</b></span>
      <span>Score: <b id="mcqScore">0</b></span>
    </div>
    <div class="mcq-q" id="mcqQuestion"></div>
    <div class="mcq-choices" id="mcqChoices"></div>
    <div class="mcq-feedback" id="mcqFeedback"></div>
    <div class="mcq-next hidden" id="mcqNextRow">
      <button class="btn btn-primary" onclick="nextMCQ()">Next Question →</button>
    </div>
  </div>
  <div class="retry-row" id="retryRow">
    <button class="retry-btn" onclick="retryLastTurn()">↻ Try again</button>
  </div>
</div>

<div class="trans-bar">
  <div class="trans-box"><span class="trans-label">Tip</span><span id="transText">Tap Call. Nova will wait until you finish speaking.</span></div>
</div>

<div class="call-area">
  <div id="timerArea" class="hidden"><div class="call-timer" id="callTimer">0:00</div></div>
  <div class="call-controls">
    <button class="call-btn side hidden" id="muteBtn" onclick="toggleMute()">🎤</button>
    <button class="call-btn dial" id="callBtn" onclick="toggleCall()">📞</button>
    <button class="call-btn side hidden" id="skipBtn" onclick="skipTurn()">⏭</button>
  </div>
  <div class="call-label" id="callLabel">Tap to start</div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="welcomeModal">
  <div class="modal"><div id="modalContent"></div></div>
</div>

<script>
const BACKEND_URL = "https://weathered-salad-5b40.zapic78.workers.dev";

const TOPICS = {
  basic: {
    label: '🌱 Basic',
    desc: 'Everyday simple sentences',
    subtopics: {
      daily_routine: { name: 'Daily Routine', samples: ["I wake up at 7.","I brush my teeth.","I eat breakfast.","I go to work.","I come home at 5.","I sleep at 10."] },
      family: { name: 'Family', samples: ["I have one brother.","My mother is kind.","My father is a driver.","I love my family.","My sister is small."] },
      food: { name: 'Food', samples: ["I eat rice.","I like chicken.","I drink water.","I am hungry.","The food is good."] },
      home: { name: 'Home', samples: ["My house has three rooms.","The kitchen is small.","I sleep in my bedroom.","The TV is in the living room."] },
      greetings: { name: 'Greetings', samples: ["Hello.","Good morning.","How are you?","I am fine, thank you.","Nice to meet you.","Goodbye."] },
      weather: { name: 'Weather', samples: ["It is sunny today.","It is raining.","The weather is cold.","Today is hot."] },
      shopping: { name: 'Shopping', samples: ["How much is this?","It is too expensive.","I want to buy milk.","Where is the store?"] },
      work: { name: 'Work', samples: ["I am a driver.","I work in a store.","I start work at 9.","I like my job."] },
      health: { name: 'Health', samples: ["I have a headache.","My stomach hurts.","I am tired.","I need a doctor."] },
      directions: { name: 'Directions', samples: ["Where is the bus stop?","Turn left.","Go straight.","It is near the school."] }
    }
  },
  grammar: {
    label: '📚 Grammar',
    desc: 'Step-by-step grammar drills',
    subtopics: {
      present: { name: 'Present Tense', samples: ["I eat. You eat. He eats.","She works every day.","They play football."] },
      past: { name: 'Past Tense', samples: ["I went to the store yesterday.","She ate breakfast.","They played all day."] },
      questions: { name: 'Asking Questions', samples: ["What is your name?","Where do you live?","How old are you?","Why are you sad?"] },
      plurals: { name: 'Singular & Plural', samples: ["one cat / two cats","one box / three boxes","one child / many children"] },
      pronouns: { name: 'Pronouns', samples: ["I / me / my","You / your","He / him / his","She / her","We / us / our","They / them / their"] },
      articles: { name: 'A / An / The', samples: ["A book.","An apple.","The sun is hot."] }
    }
  },
  story: {
    label: '📖 Story',
    desc: 'Build a story together',
    subtopics: {
      cat_box: { name: 'The Cat & Box', samples: ["There was a small cat.","The cat found a big box.","What is inside the box?"] },
      lost_dog: { name: 'The Lost Dog', samples: ["A boy lost his dog.","The dog ran into the forest."] },
      magic_door: { name: 'The Magic Door', samples: ["I found a door in my garden.","It glowed with blue light."] }
    }
  },
  qa: {
    label: '❓ Q&A',
    desc: 'Practice asking & answering',
    subtopics: {
      personal: { name: 'About You', samples: ["What is your name?","How old are you?","Where are you from?"] },
      preferences: { name: 'Likes & Dislikes', samples: ["What is your favorite color?","Do you like coffee?"] },
      opinions: { name: 'Opinions', samples: ["What do you think about this?","Do you agree?"] }
    }
  },
  citizenship: {
    label: '🇺🇸 Citizen',
    desc: 'US naturalization test prep',
    subtopics: {
      cit_practice: { name: 'Practice w/ Nova', samples: ["What is the supreme law of the land?","How many U.S. Senators are there?"] },
      cit_mcq: { name: '100 Q Test', mcq: true },
      cit_listen: { name: 'Listen & Repeat', samples: ["I want to become a U.S. citizen.","I have lived here for five years."] }
    }
  }
};

const CIT_QUESTIONS = [
  { q: "What is the supreme law of the land?", a: "The Constitution", w: ["The Declaration of Independence","The Bill of Rights","The President"] },
  { q: "What does the Constitution do?", a: "Sets up the government and protects basic rights", w: ["Declares war","Names the President","Lists all 50 states"] },
  { q: "The first three words of the Constitution are…", a: "We the People", w: ["In God We Trust","Life and Liberty","One Nation Indivisible"] },
  { q: "What is an amendment?", a: "A change to the Constitution", w: ["A new law passed by Congress","A presidential order","A court ruling"] },
  { q: "What do we call the first ten amendments?", a: "The Bill of Rights", w: ["The Articles","The Preamble","The Federalist Papers"] },
  { q: "What is one right from the First Amendment?", a: "Freedom of speech", w: ["The right to vote","The right to bear arms","The right to a fair trial"] },
  { q: "How many amendments does the Constitution have?", a: "Twenty-seven (27)", w: ["Ten (10)","Twenty (20)","Fifty (50)"] },
  { q: "What did the Declaration of Independence do?", a: "Announced our independence from Great Britain", w: ["Created the Constitution","Ended slavery","Started the Civil War"] },
  { q: "Name one right in the Declaration of Independence.", a: "Life", w: ["The right to drive","The right to own land","The right to free education"] },
  { q: "What is the economic system of the United States?", a: "Capitalist / market economy", w: ["Socialist economy","Communist economy","Bartering only"] },
  { q: "What is the 'rule of law'?", a: "Everyone must follow the law", w: ["The President makes all laws","Only judges follow the law","The military runs the government"] },
  { q: "Name one branch of government.", a: "Legislative (Congress)", w: ["Military","Police","School board"] },

// ============= Profile / localStorage =============
function loadProfiles(){ try{return JSON.parse(localStorage.getItem('linguacall_profiles')||'{"users":[],"lastUserId":null}');}catch(e){return{users:[],lastUserId:null};} }
function saveProfiles(d){ try{localStorage.setItem('linguacall_profiles',JSON.stringify(d));}catch(e){} }
function getProfileById(id){ return loadProfiles().users.find(u=>u.id===id); }
function upsertProfile(p){ const d=loadProfiles(); const i=d.users.findIndex(u=>u.id===p.id); if(i>=0)d.users[i]=p; else d.users.push(p); d.lastUserId=p.id; saveProfiles(d); }
function deleteProfile(id){ const d=loadProfiles(); d.users=d.users.filter(u=>u.id!==id); if(d.lastUserId===id)d.lastUserId=null; saveProfiles(d); }
function makeUserId(n,d){ return (n.toLowerCase().replace(/\s+/g,'_')+'_'+d).replace(/[^a-z0-9_-]/g,''); }

function applyProfile(p){
  currentUser=p;
  selectedTopic = p.topic && TOPICS[p.topic] ? p.topic : 'basic';
  const validSubs = Object.keys(TOPICS[selectedTopic].subtopics);
  selectedSubtopic = p.subtopic && validSubs.includes(p.subtopic) ? p.subtopic : validSubs[0];
  selectedLevel = p.level || 'beginner';
  selectedVoice = p.voice || 'woman';
  selectedNative = p.native || 'none';
  document.getElementById('profileTagName').textContent = p.name;
  document.getElementById('profileTag').classList.remove('hidden');
  renderTopicGrid(); renderSubtopicGrid();
  document.querySelectorAll('[data-level]').forEach(b=>b.classList.toggle('selected',b.dataset.level===selectedLevel));
  document.querySelectorAll('[data-voice]').forEach(b=>b.classList.toggle('selected',b.dataset.voice===selectedVoice));
  document.querySelectorAll('[data-native]').forEach(b=>b.classList.toggle('selected',b.dataset.native===selectedNative));
}
function persistProfile(){
  if(!currentUser) return;
  currentUser.topic=selectedTopic; currentUser.subtopic=selectedSubtopic;
  currentUser.level=selectedLevel; currentUser.voice=selectedVoice; currentUser.native=selectedNative;
  currentUser.lastActive=new Date().toISOString();
  upsertProfile(currentUser);
}

function renderTopicGrid(){

// ============= Selectors =============
function selectLevel(b){ document.querySelectorAll('[data-level]').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); selectedLevel=b.dataset.level; persistProfile(); }
function selectVoice(b){ document.querySelectorAll('[data-voice]').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); selectedVoice=b.dataset.voice; persistProfile(); previewVoice(); }

function previewVoice(){
  synth.cancel();
  const u=new SpeechSynthesisUtterance("Hello! This is how I sound.");
  const vp=VOICE_PROFILES[selectedVoice];
  u.pitch=vp.pitch; u.rate=LEVEL_CONFIG[selectedLevel].rate*vp.rateMod; u.lang='en-US';
  const v=pickSynthVoice(); if(v) u.voice=v;
  synth.speak(u);
}

function pickSynthVoice(){
  const voices=synth.getVoices();
  if(!voices.length) return null;
  const vp=VOICE_PROFILES[selectedVoice];
  const lower=v=>v.name.toLowerCase();
  // Get all English voices
  const enVoices=voices.filter(v=>v.lang.toLowerCase().startsWith('en'));
  if(!enVoices.length) return null;
  // Prefer Google voices (much higher quality on Android Chrome)
  const googleVoices=enVoices.filter(v=>lower(v).includes('google'));
  const pool=googleVoices.length?googleVoices:enVoices;
  // Filter by gender hint
  const fH=['female','samantha','karen','sarah','allison','victoria','susan','tessa','fiona','moira','zoe','google us english','google uk english female'];
  const mH=['male','daniel','george','mark','fred','alex','tom','oliver','google uk english male'];
  if(vp.prefersFemale){
    const f=pool.filter(v=>fH.some(h=>lower(v).includes(h)));
    if(f.length) return f[0];
  } else if(vp.prefersMale){
    const m=pool.filter(v=>mH.some(h=>lower(v).includes(h)));
    if(m.length) return m[0];
  }
  return pool[0];
}

// ============= System prompt =============
function buildSystem(){
  const lc=LEVEL_CONFIG[selectedLevel];
  const topicCfg=TOPICS[selectedTopic];
  const subCfg=topicCfg.subtopics[selectedSubtopic];
  const samples=(subCfg.samples||[]).map(s=>`  • "${s}"`).join('\n');

  let modeNote='';
  if(selectedTopic==='basic'){
    modeNote=`This is a daily-life conversation focused EXCLUSIVELY on the sub-topic "${subCfg.name}". DRILL DEEPER into this one topic — vocabulary, simple sentences, common phrases. DO NOT switch to any other topic.`;
  } else if(selectedTopic==='grammar'){
    modeNote=`This is a grammar lesson on "${subCfg.name}". Teach the grammar rule step by step. Give a tiny example, then ask the learner to make their own sentence using this rule. Stay on this grammar point the entire session.`;
  } else if(selectedTopic==='story'){
    modeNote=`Tell an interactive story called "${subCfg.name}". Narrate 1-2 short sentences then ask the learner to choose what happens next. Stay in the story world.`;
  } else if(selectedTopic==='qa'){
    modeNote=`Ask simple "${subCfg.name}" questions, one at a time. React to learner's answer, then ask another related question. Stay on this category.`;
  } else if(selectedTopic==='citizenship'){
    if(selectedSubtopic==='cit_practice'){ modeNote=`Practice the US naturalization (citizenship) civics test in conversation. Ask one official-style civics question per turn. When learner answers, gently confirm right or correct them. Use simple English.`; }
    else if(selectedSubtopic==='cit_listen'){ modeNote=`Slowly say one important citizenship-related sentence. Ask learner to repeat it. Praise effort, gently correct.`; }
  }

  return `You are Nova, a warm and patient English tutor.

LEARNER:
- Name: ${currentUser?currentUser.name:'Learner'}
- Level: ${lc.label}
- ${lc.instructions}

CURRENT TOPIC (CRITICAL — STAY ON THIS FOR THE ENTIRE SESSION):
- Main: ${topicCfg.label} (${topicCfg.desc})
- Sub-topic: ${subCfg.name}

${modeNote}

EXAMPLE SENTENCES for this sub-topic (use these patterns and expand on them):
${samples}

CRITICAL RULES:
1. STAY on "${subCfg.name}" for the WHOLE conversation. Do NOT jump to other topics.
2. After the learner speaks, ALWAYS acknowledge what they said FIRST (e.g., "Good!", "I understand.", "Nice sentence.") before your next sentence.
3. Keep replies SHORT for ${lc.label} level. Do not overload the learner.
4. Reply in English only.

OUTPUT FORMAT — STRICT JSON ONLY, no markdown, no backticks:
{
  "reply": "your short conversational reply, ending with a question or prompt about THE SAME sub-topic",
  "native_translation": "",
  "correction": {
    "has_error": true or false,
    "original": "the learner's exact sentence (or empty string if system note in brackets)",
    "corrected": "corrected version if has_error true, else empty",
    "note": "one short sentence in simple English explaining the fix, or empty if no error"
  }
}

Rules:
- Always leave "native_translation" as empty string.
- If learner input was a system note in [brackets], correction.has_error=false and original="".
- If learner's sentence was perfect, has_error=false but put their sentence in "original" so we can praise.
- Never repeat the same reply twice in a row.
- Output must be VALID JSON — no trailing commas.`;
}

function buildOpener(){
  const sub=TOPICS[selectedTopic].subtopics[selectedSubtopic];
  const name=currentUser?currentUser.name:'friend';
  if(selectedLevel==='beginner'){
    return `Hello ${name}! I am Nova. Today we will talk about ${sub.name.toLowerCase()}. Are you ready?`;
  }
  return `Hi ${name}! I'm Nova. Today's focus: ${sub.name}. Let's begin — tell me one thing about it.`;
}

// ============= Speak (TTS) =============
function speak(text){
  if(!inCall) return;
  clearWatchdog();
  isSpeaking=true; isListening=false; isThinking=false;
  document.getElementById('avatarInner').className='avatar-inner speaking';
  setPill('Speaking','active');
  wordCount+=text.split(' ').length; turnCount++; updateStats();
  synth.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  const vp=VOICE_PROFILES[selectedVoice];
  utt.lang='en-US';
  utt.rate=LEVEL_CONFIG[selectedLevel].rate*vp.rateMod;
  utt.pitch=vp.pitch;
  const v=pickSynthVoice(); if(v) utt.voice=v;
  utt.onend=()=>{
    if(!inCall) return;
    isSpeaking=false;
    document.getElementById('avatarInner').className='avatar-inner';
    if(!muted){ armWatchdog(); setTimeout(()=>{ if(inCall && !isSpeaking) startListen(); },500); }
  };
  utt.onerror=()=>{
    isSpeaking=false;
    document.getElementById('avatarInner').className='avatar-inner';
    if(inCall && !muted){ armWatchdog(); setTimeout(()=>{ if(inCall) startListen(); },600); }
  };
  const estMs=Math.max(2500,text.split(' ').length*500);
  setTimeout(()=>{
    if(inCall && isSpeaking){
      isSpeaking=false;
      document.getElementById('avatarInner').className='avatar-inner';
      if(!muted){ armWatchdog(); startListen(); }
    }
  },estMs+4000);
  synth.speak(utt);
}

// ============= Listen — waits 3s of silence before sending =============
function startListen(){
  if(!inCall||isListening||isSpeaking||isThinking) return;
  clearWatchdog(); hideRetry();
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    setPill('Auto','listening'); armWatchdog();
    setTimeout(()=>{ if(inCall && !isSpeaking) fetchAIReply('[Learner is listening. Continue with the same sub-topic.]'); },3500);
    return;
  }
  isListening=true;
  lastTranscriptInterim=''; lastTranscriptFinal='';
  document.getElementById('avatarInner').className='avatar-inner mic-on';
  setPill('Listening… speak now','listening');
  document.getElementById('transText').textContent='Speak naturally. Nova will wait until you finish.';
  armWatchdog();
  stopRecognition();
  recognition=new SR();
  recognition.lang='en-US';
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.maxAlternatives=1;

  if(silenceTimer) clearTimeout(silenceTimer);
  silenceTimer=setTimeout(()=>{
    if(isListening && !lastTranscriptFinal.trim() && !lastTranscriptInterim.trim()){
      stopRecognition(); isListening=false;
      if(inCall && !isSpeaking){
        fetchAIReply('[The learner was quiet. Gently encourage them to try one simple sentence about the same sub-topic.]');
      }
    }
  },15000);

  recognition.onresult=(e)=>{
    let interim='', finalT='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) finalT+=t+' ';
      else interim+=t+' ';
    }
    lastTranscriptFinal=(lastTranscriptFinal+finalT).trim();
    lastTranscriptInterim=interim.trim();
    const combined=(lastTranscriptFinal+' '+lastTranscriptInterim).trim();
    if(combined){
      document.getElementById('transText').textContent='"'+combined+'"';
      if(endpointTimer) clearTimeout(endpointTimer);
      endpointTimer=setTimeout(()=>{ finalizeUserTurn(); },1800);
    }
  };

  recognition.onerror=(e)=>{
    if(endpointTimer) clearTimeout(endpointTimer);
    if(silenceTimer) clearTimeout(silenceTimer);
    isListening=false;
    document.getElementById('avatarInner').className='avatar-inner';
    if(!inCall) return;
    if(e.error==='not-allowed'){ showToast('Mic access denied. Allow mic in settings.','err'); fetchAIReply('[Mic unavailable. Continue gently.]'); }
    else if(e.error==='no-speech'||e.error==='aborted'){ /* expected */ }
    else fetchAIReply('[Tech issue. Continue on same sub-topic.]');
  };

  recognition.onend=()=>{
    if(isListening){
      isListening=false;
      document.getElementById('avatarInner').className='avatar-inner';
      if(lastTranscriptFinal.trim()||lastTranscriptInterim.trim()) finalizeUserTurn();
    }
  };

  try{ recognition.start(); }
  catch(e){
    isListening=false; armWatchdog();
    setTimeout(()=>{ if(inCall && !isSpeaking) fetchAIReply('[Continue same sub-topic with a simple question.]'); },1000);
  }
}

function finalizeUserTurn(){
  if(endpointTimer){clearTimeout(endpointTimer);endpointTimer=null;}
  if(silenceTimer){clearTimeout(silenceTimer);silenceTimer=null;}
  const transcript=(lastTranscriptFinal+' '+lastTranscriptInterim).trim();
  isListening=false;
  stopRecognition();
  document.getElementById('avatarInner').className='avatar-inner';
  if(transcript){ showUserSaid(transcript); fetchAIReply(transcript); }
  else fetchAIReply('[unclear, ask them to repeat in a friendly way.]');
  lastTranscriptFinal=''; lastTranscriptInterim='';
}

function stopRecognition(){ if(recognition){ try{recognition.abort();}catch(e){} recognition=null; } }

// ============= Fetch with retry =============
async function fetchWithRetry(url,options,maxAttempts=3){
  let lastErr;
  for(let attempt=1;attempt<=maxAttempts;attempt++){
    try{
      const res=await fetch(url,options);
      if((res.status===503||res.status===429||res.status===502||res.status===504) && attempt<maxAttempts){
        await new Promise(r=>setTimeout(r,Math.pow(2,attempt-1)*1000));
        setPill('Thinking… (retry '+attempt+')','listening');
        continue;
      }
      return res;
    }catch(err){
      lastErr=err;
      if(attempt<maxAttempts){ await new Promise(r=>setTimeout(r,Math.pow(2,attempt-1)*1000)); continue; }
      throw lastErr;
    }
  }
  throw lastErr||new Error('All retries exhausted');
}

async function fetchAIReply(userInput){
  if(!inCall||isThinking||isSpeaking) return;
  isThinking=true; isListening=false;
  lastFailedInput=userInput;
  document.getElementById('avatarInner').className='avatar-inner';
  setPill('Thinking…','listening');
  setTutorText('<span class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>');
  hideCorrection(); armWatchdog();
  conversationHistory.push({role:'user',content:userInput});
  const msgs=conversationHistory.slice(-8);
  try{
    const res=await fetchWithRetry(BACKEND_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:buildSystem(),messages:msgs})});
    if(!res.ok) throw new Error('API '+res.status);
    const data=await res.json();
    const rawText=data.content?.find(c=>c.type==='text')?.text?.trim();
    if(!rawText) throw new Error('Empty');
    const parsed=parseTutorJSON(rawText);
    if(!parsed||!parsed.reply) throw new Error('Bad JSON');
    conversationHistory.push({role:'assistant',content:JSON.stringify(parsed)});
    isThinking=false; lastFailedInput=null; clearWatchdog();
    document.getElementById('transText').textContent='Nova is speaking…';
    renderTurn(parsed);
  } catch(err){
    isThinking=false;
    console.error('API error:',err);
    showRetry();
    showToast('Nova had trouble — tap retry or wait.','err');
    setTimeout(()=>{
      if(inCall && !isSpeaking && !isThinking && !isListening){
        const sub=TOPICS[selectedTopic].subtopics[selectedSubtopic];
        const ex=(sub.samples&&sub.samples.length)?sub.samples[turnCount%sub.samples.length]:"Let's keep going!";
        const fb="Let's stay on "+sub.name+". Try: "+ex+" — can you say something like that?";
        conversationHistory.push({role:'assistant',content:JSON.stringify({reply:fb,native_translation:'',correction:{has_error:false,original:'',corrected:'',note:''}})});
        hideRetry();
        renderTurn({reply:fb,native_translation:'',correction:{has_error:false,original:'',corrected:'',note:''}});
      }
    },10000);
  }
}

function parseTutorJSON(raw){
  let c=raw.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'');
  try{ return JSON.parse(c); }
  catch(e){
    const m=c.match(/\{[\s\S]*\}/);
    if(m){ try{ return JSON.parse(m[0]); }catch(e2){return null;} }
    return null;
  }
}

function retryLastTurn(){
  if(!inCall||!lastFailedInput) return;
  hideRetry();
  fetchAIReply(lastFailedInput);
}

// ============= Render =============
function renderTurn(parsed){
  setTutorText(escapeHtml(parsed.reply));
  const nl=document.getElementById('nativeLine');
  nl.textContent=(parsed.native_translation && parsed.native_translation.trim()) ? parsed.native_translation : '';
  const c=parsed.correction||{};
  if(c.original && c.original.trim()) showCorrection(c);
  else hideCorrection();
  speak(parsed.reply);
}

function showCorrection(c){
  const card=document.getElementById('correctionCard');
  card.classList.add('show');
  const label=document.getElementById('corrLabel');
  const orig=document.getElementById('corrOriginal');
  const fixed=document.getElementById('corrFixed');
  const note=document.getElementById('corrNote');
  if(c.has_error){
    label.textContent='Better way:'; label.className='corr-label fix';
    orig.textContent='✗ '+c.original;
    fixed.textContent='✓ '+c.corrected; fixed.classList.remove('hidden');
    note.textContent=c.note||'';
  } else {
    label.textContent='Nice! Correct'; label.className='corr-label ok';
    orig.textContent='✓ '+c.original;
    fixed.classList.add('hidden');
    note.textContent=c.note||'';
  }
}
function hideCorrection(){ document.getElementById('correctionCard').classList.remove('show'); }

function showUserSaid(t){
  document.getElementById('userText').textContent=t;
  document.getElementById('userBubble').classList.remove('hidden');
  document.getElementById('userLabel').classList.remove('hidden');
}
function setTutorText(html){ document.getElementById('tutorText').innerHTML=html; }
function setPill(text,cls){ const p=document.getElementById('statusPill'); p.textContent=text; p.className='status-pill'+(cls?' '+cls:''); }
function showRetry(){ document.getElementById('retryRow').classList.add('show'); }
function hideRetry(){ document.getElementById('retryRow').classList.remove('show'); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

function updateStats(){
  document.getElementById('statWords').textContent=wordCount;
  document.getElementById('statTurns').textContent=turnCount;
  const m=Math.floor(callSeconds/60), s=callSeconds%60;
  const t=m+':'+String(s).padStart(2,'0');
  document.getElementById('statTime').textContent=t;
  document.getElementById('callTimer').textContent=t;
}

function armWatchdog(){
  clearWatchdog();
  watchdogTimer=setTimeout(()=>{
    if(!inCall) return;
    if(!isSpeaking && !isListening && !isThinking) showRetry();
  },25000);
}
function clearWatchdog(){ if(watchdogTimer){clearTimeout(watchdogTimer);watchdogTimer=null;} }

function showToast(msg,kind){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(kind?' '+kind:'');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ============= MCQ =============
function startMCQ(){
  mcqMode=true; mcqIdx=0; mcqScoreVal=0; mcqAnswered=false;
  mcqQueue=[...CIT_QUESTIONS].sort(()=>Math.random()-0.5).slice(0,10);
  inCall=true; callSeconds=0; turnCount=0; wordCount=0; updateStats();
  document.getElementById('mcqCard').classList.remove('hidden');
  document.getElementById('callBtn').classList.add('end');
  document.getElementById('callBtn').textContent='⏹';
  document.getElementById('timerArea').classList.remove('hidden');
  document.getElementById('callLabel').textContent='Tap to end test';
  setPill('Test in progress','active');
  timerInterval=setInterval(()=>{callSeconds++;updateStats();},1000);
  document.getElementById('mcqQTotal').textContent=mcqQueue.length;
  document.getElementById('userBubble').classList.add('hidden');
  document.getElementById('userLabel').classList.add('hidden');
  hideCorrection();
  renderMCQ();
}

function renderMCQ(){
  if(mcqIdx>=mcqQueue.length){ finishMCQ(); return; }
  const q=mcqQueue[mcqIdx];
  document.getElementById('mcqQNum').textContent=(mcqIdx+1);
  document.getElementById('mcqScore').textContent=mcqScoreVal;
  document.getElementById('mcqQuestion').textContent=q.q;
  const choices=[q.a,...q.w].map(c=>({text:c,correct:c===q.a})).sort(()=>Math.random()-0.5);
  const box=document.getElementById('mcqChoices');
  box.innerHTML='';
  choices.forEach(c=>{
    const b=document.createElement('button');
    b.className='mcq-choice';
    b.textContent=c.text;
    b.onclick=()=>answerMCQ(b,c.correct,q.a);
    box.appendChild(b);
  });
  document.getElementById('mcqFeedback').classList.remove('show');
  document.getElementById('mcqNextRow').classList.add('hidden');
  mcqAnswered=false;
  setTutorText('Read the question and tap your answer.');
  document.getElementById('nativeLine').textContent='';
  speakSimple(q.q);
}

function answerMCQ(btn,correct,correctAnswer){
  if(mcqAnswered) return;
  mcqAnswered=true;
  document.querySelectorAll('.mcq-choice').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correctAnswer) b.classList.add('correct');
  });
  if(correct){
    btn.classList.add('correct');
    mcqScoreVal++;
    document.getElementById('mcqScore').textContent=mcqScoreVal;
    showMCQFeedback('✓ Correct! Well done.','ok');
    speakSimple('Correct!');
  } else {
    btn.classList.add('wrong');
    showMCQFeedback('✗ Not quite. The correct answer is: '+correctAnswer,'bad');
    speakSimple('The correct answer is: '+correctAnswer);
  }
  document.getElementById('mcqNextRow').classList.remove('hidden');
}

function showMCQFeedback(text,kind){
  const f=document.getElementById('mcqFeedback');
  f.textContent=text;
  f.className='mcq-feedback show '+kind;
}

function nextMCQ(){ mcqIdx++; renderMCQ(); }

function finishMCQ(){
  const pct=Math.round((mcqScoreVal/mcqQueue.length)*100);
  const msg='Test finished! You scored '+mcqScoreVal+' out of '+mcqQueue.length+' ('+pct+'%). '+(pct>=60?'You passed!':'Keep practicing — you can do this.');
  document.getElementById('mcqQuestion').textContent='🎉 '+msg;
  document.getElementById('mcqChoices').innerHTML='';
  document.getElementById('mcqFeedback').classList.remove('show');
  document.getElementById('mcqNextRow').classList.add('hidden');
  speakSimple(msg);
  if(currentUser){
    currentUser.citizenshipScore={correct:mcqScoreVal,total:mcqQueue.length,lastPct:pct,when:new Date().toISOString()};
    upsertProfile(currentUser);
  }
  setTimeout(()=>endCall(),5000);
}

function speakSimple(text){
  synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const vp=VOICE_PROFILES[selectedVoice];
  u.lang='en-US';
  u.rate=LEVEL_CONFIG[selectedLevel].rate*vp.rateMod;
  u.pitch=vp.pitch;
  const v=pickSynthVoice(); if(v) u.voice=v;
  synth.speak(u);
}

// ============= Wave animation =============
function startWaveAnim(){
  const canvas=document.getElementById('waveCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  function resize(){ canvas.width=canvas.clientWidth*dpr; canvas.height=canvas.clientHeight*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
  resize();
  window.addEventListener('resize',resize);
  function draw(){
    const w=canvas.clientWidth, h=canvas.clientHeight;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    wavePhase+=0.05;
    const amp=(isSpeaking||isListening)?6:2;
    ctx.strokeStyle=isSpeaking?'#a78bfa':isListening?'#22d3a0':'#3a3a4a';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let x=0;x<=w;x+=2){
      const y=h/2+Math.sin((x*0.03)+wavePhase)*amp+Math.sin((x*0.07)+wavePhase*1.3)*(amp/2);
      if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}

let deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredInstallPrompt=e;
  document.getElementById('installBtn').classList.remove('hidden');
});
function installApp(){
  if(!deferredInstallPrompt){
    showToast('In Chrome menu (⋮), tap "Add to Home screen"','ok');
    return;
  }
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then((choice)=>{
    if(choice.outcome==='accepted'){ showToast('Installing… check your home screen!','ok'); }
    deferredInstallPrompt=null;
    document.getElementById('installBtn').classList.add('hidden');
  });
}
window.addEventListener('appinstalled',()=>{
  document.getElementById('installBtn').classList.add('hidden');
  showToast('LinguaCall installed! 🎉','ok');
});
