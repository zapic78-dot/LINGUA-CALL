<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#2563eb" />
<title>Lingua Companion AI</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <div class="auth-wrap">
    <div class="brand" style="justify-content:center;margin-bottom:20px">
      <div class="brand-mark">L</div>
      <div><div class="brand-name" style="font-size:20px">Lingua Companion AI</div>
      <div class="muted" style="font-size:12px">Learn English. Pass citizenship.</div></div>
    </div>

    <div class="hero" style="margin-top:10px">
      <h2>Welcome 👋</h2>
      <p>Tell us your name to get started. No password, no email — your progress stays on this device.</p>
    </div>

    <form id="startForm" style="margin-top:18px">
      <div class="field">
        <label for="name">Your name</label>
        <input id="name" type="text" required autocomplete="given-name" placeholder="e.g. Adil" />
      </div>
      <div class="field">
        <label for="level">Your English level</label>
        <select id="level">
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
        </select>
      </div>
      <button class="btn" type="submit">Start practicing →</button>
    </form>

    <div class="tiles" style="margin-top:24px">
      <div class="tile"><span class="ic">💬</span><h4>Voice chat</h4><p>Speak with AI</p></div>
      <div class="tile"><span class="ic">📖</span><h4>Grammar coach</h4><p>Real-time fixes</p></div>
      <div class="tile"><span class="ic">🇺🇸</span><h4>100 USCIS Qs</h4><p>Flashcards + quiz</p></div>
      <div class="tile"><span class="ic">🎯</span><h4>Daily streak</h4><p>Build the habit</p></div>
    </div>
  </div>
</div>
<script type="module">
  import { $, saveProfile, getProfile } from "./app.js";
  // If already set up, skip straight to dashboard
  if(getProfile()?.name) location.href = "dashboard.html";
  $("#startForm").addEventListener("submit",(e)=>{
    e.preventDefault();
    const name = $("#name").value.trim();
    if(!name) return;
    saveProfile({
      name,
      englishLevel: $("#level").value,
      streak: 0,
      citizenshipScore: 0,
      totalQuizzes: 0,
      createdAt: new Date().toISOString()
    });
    location.href = "dashboard.html";
  });
</script>
</body>
</html>
