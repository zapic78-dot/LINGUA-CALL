<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6c63ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LinguaCall">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>LinguaCall — AI Language Tutor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3a;
    --accent:#6c63ff;--accent2:#a78bfa;--green:#22d3a0;--red:#ff5c72;
    --text:#f0f0f8;--muted:#7070a0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:30px;}
  header{width:100%;max-width:480px;padding:18px 24px 0;display:flex;justify-content:space-between;align-items:center;}
  .logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .status-pill{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);letter-spacing:0.5px;text-transform:uppercase;}
  .status-pill.active{color:var(--green);border-color:var(--green);background:rgba(34,211,160,0.08);}
  .status-pill.listening{color:var(--accent2);border-color:var(--accent2);background:rgba(107,99,255,0.08);}
  .status-pill.error{color:var(--red);border-color:var(--red);background:rgba(255,92,114,0.08);}

  .section{width:100%;max-width:480px;padding:16px 24px 0;}
  .sec-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;font-weight:600;}

  .lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .lang-btn{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:9px 5px;cursor:pointer;text-align:center;transition:all 0.18s;color:var(--text);font-family:inherit;}
  .lang-btn .flag{font-size:20px;display:block;margin-bottom:3px;}
  .lang-btn .ln{font-size:9px;color:var(--muted);font-weight:500;}
  .lang-btn:hover{border-color:var(--accent);}
  .lang-btn.selected{border-color:var(--accent);background:rgba(108,99,255,0.15);}
  .lang-btn.selected .ln{color:var(--accent2);}

  .mode-row{display:flex;gap:7px;flex-wrap:wrap;}
  .mode-btn{flex:1;min-width:90px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 6px;cursor:pointer;text-align:center;transition:all 0.18s;color:var(--text);font-family:inherit;font-size:11px;font-weight:500;}
  .mode-btn .mi{font-size:15px;display:block;margin-bottom:2px;}
  .mode-btn:hover{border-color:var(--accent);}
  .mode-btn.selected{border-color:var(--accent);background:rgba(108,99,255,0.12);color:var(--accent2);}

  .level-row{display:flex;gap:7px;}
  .level-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 6px;cursor:pointer;text-align:center;transition:all 0.18s;color:var(--muted);font-family:inherit;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
  .level-btn:hover{border-color:var(--accent);}
  .level-btn.selected.beg{border-color:var(--green);background:rgba(34,211,160,0.1);color:var(--green);}
  .level-btn.selected.med{border-color:#f59e0b;background:rgba(245,158,11,0.1);color:#f59e0b;}
  .level-btn.selected.adv{border-color:var(--red);background:rgba(255,92,114,0.1);color:var(--red);}

  .native-row{display:flex;gap:7px;flex-wrap:wrap;}
  .native-btn{flex:1;min-width:78px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 6px;cursor:pointer;text-align:center;transition:all 0.18s;color:var(--muted);font-family:inherit;font-size:11px;font-weight:500;}
  .native-btn:hover{border-color:var(--accent);}
  .native-btn.selected{border-color:var(--accent2);background:rgba(167,139,250,0.12);color:var(--accent2);}

  .tutor-area{width:100%;max-width:480px;padding:20px 24px 10px;display:flex;flex-direction:column;align-items:center;}
  .avatar-ring{position:relative;width:130px;height:130px;margin-bottom:14px;}
  .avatar-ring canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;}
  .avatar-inner{position:absolute;top:10px;left:10px;width:110px;height:110px;border-radius:50%;background:linear-gradient(145deg,var(--accent),#4a3fcf);display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 0 30px rgba(108,99,255,0.3);transition:box-shadow 0.3s;}
  .avatar-inner.speaking{box-shadow:0 0 55px rgba(108,99,255,0.6),0 0 20px rgba(167,139,250,0.4);animation:breathe 1.4s ease-in-out infinite;}
  .avatar-inner.mic-on{box-shadow:0 0 40px rgba(34,211,160,0.5);}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.045);}}
  .tutor-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;letter-spacing:-0.5px;margin-bottom:3px;}
  .tutor-sub{font-size:11px;color:var(--muted);}

  .stats-row{width:100%;max-width:480px;padding:0 24px 0;display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;text-align:center;}
  .stat-val{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--accent2);}
  .stat-name{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}

  #waveCanvas{width:calc(100% - 48px);max-width:432px;height:44px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:block;margin:12px 24px 0;}

  .chat-box{width:100%;max-width:480px;padding:10px 24px 0;}
  .bubble-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:5px;font-weight:600;}
  .bubble{background:var(--surface2);border:1px solid var(--border);border-radius:14px 14px 14px 4px;padding:12px 14px;font-size:13px;line-height:1.6;color:var(--text);min-height:48px;}
  .bubble.user-bubble{background:rgba(108,99,255,0.1);border-color:rgba(108,99,255,0.25);border-radius:14px 14px 4px 14px;color:var(--accent2);margin-top:8px;}
  .typing-dots{display:inline-flex;gap:4px;align-items:center;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:bounce 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,100%{transform:translateY(0);opacity:0.4;}50%{transform:translateY(-4px);opacity:1;}}

  /* Correction card */
  .correction-card{display:none;margin-top:8px;background:rgba(34,211,160,0.06);border:1px solid rgba(34,211,160,0.3);border-radius:12px;padding:10px 13px;}
  .correction-card.show{display:block;}
  .correction-card.has-fix{background:rgba(245,158,11,0.07);border-color:rgba(245,158,11,0.35);}
  .corr-label{font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:5px;}
  .corr-label.ok{color:var(--green);}
  .corr-label.fix{color:#f59e0b;}
  .corr-line{font-size:12.5px;line-height:1.55;}
  .corr-line.strike{color:var(--muted);text-decoration:line-through;}
  .corr-line.good{color:var(--green);font-weight:500;}
  .corr-note{font-size:11.5px;color:var(--muted);margin-top:4px;}

  .native-line{font-size:11.5px;color:var(--accent2);margin-top:6px;font-style:italic;display:none;}
  .native-line.show{display:block;}

  .trans-bar{width:100%;max-width:480px;padding:8px 24px 0;}
  .trans-box{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 13px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;min-height:36px;}
  .trans-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--accent);white-space:nowrap;}

  .call-area{width:100%;max-width:480px;padding:16px 24px 0;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .call-timer{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:600;letter-spacing:2px;color:var(--green);text-align:center;}
  .call-controls{display:flex;align-items:center;gap:18px;}
  .call-btn{border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.22s;}
  .call-btn.dial{width:76px;height:76px;font-size:30px;background:linear-gradient(145deg,var(--green),#16a07a);box-shadow:0 4px 20px rgba(34,211,160,0.4);}
  .call-btn.dial:hover{transform:scale(1.08);box-shadow:0 6px 30px rgba(34,211,160,0.6);}
  .call-btn.hangup{width:76px;height:76px;font-size:30px;background:linear-gradient(145deg,var(--red),#c0392b);box-shadow:0 4px 20px rgba(255,92,114,0.4);}
  .call-btn.hangup:hover{transform:scale(1.08);}
  .call-btn.side{width:50px;height:50px;font-size:19px;background:var(--surface2);border:1px solid var(--border);color:var(--text);}
  .call-btn.side.muted{background:rgba(255,92,114,0.15);border-color:var(--red);}
  .call-label{font-size:12px;color:var(--muted);text-align:center;}
  .hidden{display:none!important;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:10px;font-size:12px;z-index:100;display:none;max-width:340px;text-align:center;}
  .toast.err{border-color:var(--red);color:var(--red);}
  .toast.ok{border-color:var(--green);color:var(--green);}

  .retry-row{display:none;gap:8px;margin-top:10px;}
  .retry-row.show{display:flex;}
  .retry-btn{flex:1;background:var(--surface2);border:1px solid var(--accent);color:var(--accent2);font-family:inherit;font-size:12px;font-weight:500;padding:9px;border-radius:9px;cursor:pointer;}
  .retry-btn:hover{background:rgba(108,99,255,0.15);}
</style>
</head>
<body>

<header>
  <div class="logo">LinguaCall</div>
  <div class="status-pill" id="statusPill">Ready</div>
</header>

<div class="section">
  <div class="sec-label">Learning</div>
  <div class="lang-grid">
    <button class="lang-btn selected" data-lang="English" data-code="en-US" onclick="selectLang(this)"><span class="flag">🇺🇸</span><span class="ln">English</span></button>
    <button class="lang-btn" data-lang="Spanish" data-code="es-ES" onclick="selectLang(this)"><span class="flag">🇪🇸</span><span class="ln">Spanish</span></button>
    <button class="lang-btn" data-lang="French" data-code="fr-FR" onclick="selectLang(this)"><span class="flag">🇫🇷</span><span class="ln">French</span></button>
    <button class="lang-btn" data-lang="Japanese" data-code="ja-JP" onclick="selectLang(this)"><span class="flag">🇯🇵</span><span class="ln">Japanese</span></button>
    <button class="lang-btn" data-lang="Arabic" data-code="ar-SA" onclick="selectLang(this)"><span class="flag">🇸🇦</span><span class="ln">Arabic</span></button>
    <button class="lang-btn" data-lang="German" data-code="de-DE" onclick="selectLang(this)"><span class="flag">🇩🇪</span><span class="ln">German</span></button>
    <button class="lang-btn" data-lang="Chinese" data-code="zh-CN" onclick="selectLang(this)"><span class="flag">🇨🇳</span><span class="ln">Chinese</span></button>
    <button class="lang-btn" data-lang="Portuguese" data-code="pt-BR" onclick="selectLang(this)"><span class="flag">🇧🇷</span><span class="ln">Portug.</span></button>
  </div>
</div>

<div class="section">
  <div class="sec-label">Your native language (for translations &amp; help)</div>
  <div class="native-row">
    <button class="native-btn selected" data-native="none" onclick="selectNative(this)">None</button>
    <button class="native-btn" data-native="Urdu" onclick="selectNative(this)">اردو Urdu</button>
    <button class="native-btn" data-native="Pashto" onclick="selectNative(this)">پښتو Pashto</button>
    <button class="native-btn" data-native="Persian" onclick="selectNative(this)">فارسی Persian</button>
    <button class="native-btn" data-native="Spanish" onclick="selectNative(this)">Español</button>
  </div>
</div>

<div class="section">
  <div class="sec-label">Level</div>
  <div class="level-row">
    <button class="level-btn beg selected" data-level="beginner" onclick="selectLevel(this)">🌱 Beginner</button>
    <button class="level-btn med" data-level="intermediate" onclick="selectLevel(this)">🔥 Medium</button>
    <button class="level-btn adv" data-level="advanced" onclick="selectLevel(this)">⚡ Advanced</button>
  </div>
</div>

<div class="section">
  <div class="sec-label">Mode</div>
  <div class="mode-row">
    <button class="mode-btn selected" data-mode="companion" onclick="selectMode(this)"><span class="mi">💬</span>Free Talk</button>
    <button class="mode-btn" data-mode="lesson" onclick="selectMode(this)"><span class="mi">📚</span>Lesson</button>
    <button class="mode-btn" data-mode="interview" onclick="selectMode(this)"><span class="mi">🎙️</span>Interview</button>
    <button class="mode-btn" data-mode="story" onclick="selectMode(this)"><span class="mi">📖</span>Story</button>
  </div>
</div>

<div class="tutor-area">
  <div class="avatar-ring">
    <canvas id="ringCanvas" width="130" height="130"></canvas>
    <div class="avatar-inner" id="avatarInner">🤖</div>
  </div>
  <div class="tutor-name">Nova</div>
  <div class="tutor-sub" id="tutorSub">Your AI Language Companion</div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-val" id="statWords">0</div><div class="stat-name">Words</div></div>
  <div class="stat-card"><div class="stat-val" id="statTurns">0</div><div class="stat-name">Turns</div></div>
  <div class="stat-card"><div class="stat-val" id="statTime">0:00</div><div class="stat-name">Time</div></div>
</div>

<canvas id="waveCanvas"></canvas>

<div class="chat-box">
  <div class="bubble-label">Nova</div>
  <div class="bubble" id="tutorBubble">
    <span id="tutorText">Pick your language and level, then tap <strong>Call</strong>.</span>
    <div class="native-line" id="nativeLine"></div>
  </div>

  <div class="bubble-label hidden" id="userLabel" style="margin-top:9px;">You</div>
  <div class="bubble user-bubble hidden" id="userBubble"><span id="userText"></span></div>

  <div class="correction-card" id="correctionCard">
    <div class="corr-label ok" id="corrLabel">Nice!</div>
    <div class="corr-line" id="corrOriginal"></div>
    <div class="corr-line good hidden" id="corrFixed"></div>
    <div class="corr-note" id="corrNote"></div>
  </div>

  <div class="retry-row" id="retryRow">
    <button class="retry-btn" onclick="retryLastTurn()">↻ Try again — Nova didn't respond</button>
  </div>
</div>

<div class="trans-bar">
  <div class="trans-box"><span class="trans-label">Tip</span><span id="transText">Speak clearly after Nova finishes talking.</span></div>
</div>

<div class="call-area">
  <div id="timerArea" class="hidden">
    <div class="call-timer" id="callTimer">0:00</div>
  </div>
  <div class="call-controls">
    <button class="call-btn side hidden" id="muteBtn" onclick="toggleMute()">🎤</button>
    <button class="call-btn dial" id="callBtn" onclick="toggleCall()">📞</button>
    <button class="call-btn side hidden" id="skipBtn" onclick="skipTurn()">⏭</button>
  </div>
  <div class="call-label" id="callLabel">Tap to start your session</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let inCall = false;
let muted = false;
let selectedLang = 'English';
let selectedCode = 'en-US';
let selectedMode = 'companion';
let selectedLevel = 'beginner';
let selectedNative = 'none';
let callSeconds = 0, timerInterval = null;
let wordCount = 0, turnCount = 0;
let conversationHistory = [];
let animFrame = null, wavePhase = 0, ringFrame = null;
let isSpeaking = false, isListening = false, isThinking = false;
let recognition = null;
let lastFailedInput = null; // for retry
let watchdogTimer = null;   // prevents permanent stuck state
const synth = window.speechSynthesis;

// ── Backend URL ───────────────────────────────────────────────────────────────
const BACKEND_URL = "https://weathered-salad-5b40.zapic78.workers.dev";

// ── Level configs ─────────────────────────────────────────────────────────────
const LEVEL_CONFIG = {
  beginner: {
    label: 'Beginner',
    desc: 'Simple sentences, slow pace, lots of encouragement',
    rate: 0.72,
    instructions: `Use ONLY the most common 300-500 English words. Maximum 6 words per sentence. Speak very slowly in tone. Use present tense mostly. Repeat key words. Ask one very simple question per turn (yes/no or one-word-answer questions are great). Be extremely encouraging.`
  },
  intermediate: {
    label: 'Intermediate',
    desc: 'Natural pace, some correction, varied topics',
    rate: 0.88,
    instructions: `Use natural conversational language. Mix simple and intermediate vocabulary. Introduce occasional idioms and explain them briefly. Ask engaging follow-up questions. Keep a friendly, natural tone.`
  },
  advanced: {
    label: 'Advanced',
    desc: 'Full speed, complex topics, nuanced feedback',
    rate: 0.95,
    instructions: `Use rich, natural language with idioms, complex grammar, and varied vocabulary. Discuss abstract topics, opinions, culture. Challenge the learner with thought-provoking questions. Treat them as a near-fluent speaker.`
  }
};

const NATIVE_NAMES = { none: null, Urdu: 'Urdu', Pashto: 'Pashto', Persian: 'Persian (Farsi/Dari)', Spanish: 'Spanish' };

// ── System Prompt ─────────────────────────────────────────────────────────────
// IMPORTANT FIX: the model is now forced to return strict JSON with separate
// fields for { reply, native_translation, correction }. This is what makes
// the correction feature and translation feature actually work, and it also
// makes failures detectable (so the app can recover instead of freezing).
function buildSystem() {
  const lc = LEVEL_CONFIG[selectedLevel];
  const modeExtra = {
    companion: `Have a warm, flowing conversation. Ask about their life, interests, feelings. Keep it natural and fun.`,
    lesson:    `Teach vocabulary, grammar, and useful daily-life phrases (greetings, shopping, directions, family, food, work). Structure each turn: teach one short phrase → give an example → ask the student to try it.`,
    interview: `Conduct a friendly mock job interview. Ask one interview question per turn. Give brief positive feedback on their answer before the next question.`,
    story:     `Tell an interactive story together. Narrate 2-3 sentences then ask the student to make a choice or add to the story.`
  };
  const nativeName = NATIVE_NAMES[selectedNative];
  const nativeInstruction = nativeName
    ? `The learner's native language is ${nativeName}. Provide a short ${nativeName} translation of your reply in the "native_translation" field, written in ${nativeName} script.`
    : `The learner has not set a native language. Leave "native_translation" as an empty string.`;

  return `You are Nova, a friendly and expert ${selectedLang} language tutor for a complete beginner audience, including people who speak little or no English.
Level: ${lc.label}. ${lc.instructions}
Mode: ${modeExtra[selectedMode]}
${nativeInstruction}

You will receive the learner's last spoken/typed sentence in ${selectedLang}. Check it for grammar and word-choice mistakes.

Respond with STRICT JSON ONLY. No markdown, no backticks, no extra text outside the JSON object. Use exactly this shape:
{
  "reply": "your 2-3 sentence conversational reply in ${selectedLang}, always ending with a question or prompt",
  "native_translation": "translation of the reply into the learner's native language, or empty string if none set",
  "correction": {
    "has_error": true or false,
    "original": "the learner's exact sentence if there was input to check, else empty string",
    "corrected": "the corrected version, only if has_error is true, else empty string",
    "note": "one short, encouraging sentence explaining the fix in simple English, or empty string if no error"
  }
}

Rules:
- If the learner's input was a system note in brackets like [The learner is listening silently...], set correction.has_error to false and correction.original to empty string — there is nothing to correct.
- If the learner's sentence was perfect, set has_error to false but still set original to their sentence so we can show encouragement.
- Never repeat the same reply twice in a row.
- Keep "reply" short: 2-3 sentences max.
- Output must be valid JSON — no trailing commas, no comments.`;
}

const OPENERS = {
  companion: () => ({
    beginner:     `Hello! I am Nova. I am your English teacher. How are you today?`,
    intermediate: `Hi there! I'm Nova, your ${selectedLang} companion. Let's have a great conversation today. What's been on your mind lately?`,
    advanced:     `Hello! I'm Nova. Let's dive straight into a rich ${selectedLang} conversation. What's something you've been thinking about recently?`
  }),
  lesson: () => ({
    beginner:     `Hello! Welcome to your lesson. Let's learn "Hello" and "How are you?" Can you say "Hello" to me now?`,
    intermediate: `Welcome to your ${selectedLang} lesson! Today we'll practice expressing opinions. A useful phrase is "I think that..." — can you use it to tell me your opinion about something?`,
    advanced:     `Welcome! Today's ${selectedLang} session focuses on nuanced expression. Let's explore conditionals. Can you construct a sentence using "If I had known..."?`
  }),
  interview: () => ({
    beginner:     `Hello! We will practice talking like a job interview. First question: What is your name?`,
    intermediate: `Welcome to your mock interview in ${selectedLang}! Let's begin. Can you tell me a little about yourself and your professional background?`,
    advanced:     `Good day. This is your ${selectedLang} interview practice. Let's get straight to it — describe a challenging situation you faced at work and how you resolved it.`
  }),
  story: () => ({
    beginner:     `Hello! Let's tell a story. There was a cat. The cat found a box. What is in the box?`,
    intermediate: `Let's create a story together in ${selectedLang}! A young traveler arrived in a mysterious town where everyone had forgotten their names. What should the traveler do first?`,
    advanced:     `Let's co-author a story in ${selectedLang}. In a world where memories could be traded like currency, one person discovered they possessed a memory no one could afford to buy. What happens next?`
  })
};

// ── Selectors ─────────────────────────────────────────────────────────────────
function selectLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedLang = btn.dataset.lang;
  selectedCode = btn.dataset.code;
  if (!inCall) setTutorText(`<strong>${selectedLang}</strong> selected. Tap Call to begin!`);
}

function selectNative(btn) {
  document.querySelectorAll('.native-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedNative = btn.dataset.native;
}

function selectLevel(btn) {
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedLevel = btn.dataset.level;
  const lc = LEVEL_CONFIG[selectedLevel];
  if (!inCall) setTutorText(`<strong>${lc.label}</strong>: ${lc.desc}`);
}

function selectMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMode = btn.dataset.mode;
}

// ── Call Control ──────────────────────────────────────────────────────────────
function toggleCall() {
  if (!inCall) startCall(); else endCall();
}

function startCall() {
  if (!('speechSynthesis' in window)) { showToast('Speech not supported on this device/browser', 'err'); return; }
  inCall = true;
  conversationHistory = [];
  wordCount = 0; turnCount = 0; callSeconds = 0;
  lastFailedInput = null;
  hideCorrection();
  hideRetry();
  updateStats();

  const cb = document.getElementById('callBtn');
  cb.className = 'call-btn hangup'; cb.textContent = '📵';
  document.getElementById('muteBtn').classList.remove('hidden');
  document.getElementById('skipBtn').classList.remove('hidden');
  document.getElementById('timerArea').classList.remove('hidden');
  document.getElementById('callLabel').textContent = 'Session in progress...';
  setPill('Live', 'active');

  timerInterval = setInterval(() => {
    callSeconds++;
    const m = Math.floor(callSeconds/60), s = callSeconds%60;
    document.getElementById('callTimer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    document.getElementById('statTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);

  startWaveAnim();
  startRingAnim();

  const openerMap = OPENERS[selectedMode]();
  const opener = openerMap[selectedLevel];
  conversationHistory.push({ role: 'assistant', content: JSON.stringify({ reply: opener, native_translation: '', correction: { has_error:false, original:'', corrected:'', note:'' } }) });
  renderTurn({ reply: opener, native_translation: '', correction: { has_error:false, original:'', corrected:'', note:'' } });
}

function endCall() {
  inCall = false;
  synth.cancel();
  stopRecognition();
  clearInterval(timerInterval);
  clearWatchdog();

  const cb = document.getElementById('callBtn');
  cb.className = 'call-btn dial'; cb.textContent = '📞';
  document.getElementById('muteBtn').classList.add('hidden');
  document.getElementById('skipBtn').classList.add('hidden');
  document.getElementById('timerArea').classList.add('hidden');
  document.getElementById('callLabel').textContent = 'Session ended. Tap to start again.';
  document.getElementById('avatarInner').classList.remove('speaking','mic-on');
  setPill('Ready', '');
  setTutorText('Great session! 🌟 Tap Call to practice again.');
  hideCorrection();
  hideRetry();
  isSpeaking = false; isListening = false; isThinking = false;
}

// ── Watchdog: this is the core fix for "getting stuck" ────────────────────────
// If, for any reason, the app doesn't reach a clear next state (speaking,
// listening, or thinking) within 12 seconds, force it back to listening so
// the conversation never silently freezes.
function armWatchdog() {
  clearWatchdog();
  watchdogTimer = setTimeout(() => {
    if (!inCall) return;
    if (!isSpeaking && !isListening && !isThinking) {
      showRetry();
    }
  }, 20000); // 20s — long enough to allow 3 retries with backoff (1s+2s+4s + Gemini time)
}
function clearWatchdog() {
  if (watchdogTimer) { clearTimeout(watchdogTimer); watchdogTimer = null; }
}

// ── Speak ─────────────────────────────────────────────────────────────────────
function speak(text) {
  if (!inCall) return;
  clearWatchdog();
  isSpeaking = true; isListening = false; isThinking = false;
  document.getElementById('avatarInner').className = 'avatar-inner speaking';
  setPill('Speaking', 'active');
  wordCount += text.split(' ').length;
  turnCount++;
  updateStats();

  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = selectedCode;
  utt.rate = LEVEL_CONFIG[selectedLevel].rate;
  utt.pitch = 1.05;

  const voices = synth.getVoices();
  const langPrefix = selectedCode.split('-')[0];
  const match = voices.find(v => v.lang.startsWith(langPrefix));
  if (match) utt.voice = match;

  utt.onend = () => {
    if (!inCall) return;
    isSpeaking = false;
    document.getElementById('avatarInner').className = 'avatar-inner';
    if (!muted) {
      armWatchdog();
      setTimeout(() => { if (inCall && !isSpeaking) startListen(); }, 300);
    }
  };

  utt.onerror = () => {
    isSpeaking = false;
    document.getElementById('avatarInner').className = 'avatar-inner';
    if (inCall && !muted) { armWatchdog(); setTimeout(() => { if (inCall) startListen(); }, 500); }
  };

  // Safety net: some browsers never fire onend reliably. Force a fallback
  // after a generous timeout based on text length so we never hang forever.
  const estMs = Math.max(2500, text.split(' ').length * 450);
  setTimeout(() => {
    if (inCall && isSpeaking) {
      isSpeaking = false;
      document.getElementById('avatarInner').className = 'avatar-inner';
      if (!muted) { armWatchdog(); startListen(); }
    }
  }, estMs + 4000);

  synth.speak(utt);
}

// ── Listen ────────────────────────────────────────────────────────────────────
function startListen() {
  if (!inCall || isListening || isSpeaking || isThinking) return;
  clearWatchdog();
  hideRetry();

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setPill('Auto', 'listening');
    setTutorText('<span class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>');
    armWatchdog();
    setTimeout(() => { if (inCall && !isSpeaking) fetchAIReply('[The learner is listening silently. Ask them an interesting question on a new topic.]'); }, 3500);
    return;
  }

  isListening = true;
  document.getElementById('avatarInner').className = 'avatar-inner mic-on';
  setPill('Listening…', 'listening');
  setTutorText('<span class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>');
  document.getElementById('transText').textContent = 'Speak now — Nova is listening…';
  armWatchdog();

  stopRecognition();
  recognition = new SR();
  recognition.lang = selectedCode;
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  let silenceTimer = setTimeout(() => {
    if (isListening) {
      stopRecognition();
      isListening = false;
      if (inCall && !isSpeaking) {
        fetchAIReply('[The learner was quiet. Gently encourage them with a new friendly question on a different topic.]');
      }
    }
  }, 7000);

  recognition.onresult = (e) => {
    clearTimeout(silenceTimer);
    isListening = false;
    stopRecognition();
    const transcript = Array.from(e.results).map(r => r[0].transcript).join(' ').trim();
    if (transcript) {
      showUserSaid(transcript);
      document.getElementById('transText').textContent = `You said: "${transcript}"`;
      fetchAIReply(transcript);
    } else {
      fetchAIReply('[unclear, ask them to repeat or try a new topic]');
    }
  };

  recognition.onerror = (e) => {
    clearTimeout(silenceTimer);
    isListening = false;
    document.getElementById('avatarInner').className = 'avatar-inner';
    if (!inCall) return;
    if (e.error === 'not-allowed') {
      showToast('Microphone access denied. Allow mic, or type your answer using Skip.', 'err');
      fetchAIReply('[Microphone unavailable. Continue engaging the learner with a varied interesting question.]');
    } else if (e.error === 'no-speech') {
      fetchAIReply('[No speech detected. Gently prompt learner with a fresh, engaging question on a new topic.]');
    } else {
      fetchAIReply('[Technical issue. Continue the conversation naturally with a new question.]');
    }
  };

  recognition.onend = () => {
    clearTimeout(silenceTimer);
    if (isListening) {
      isListening = false;
      document.getElementById('avatarInner').className = 'avatar-inner';
    }
  };

  try { recognition.start(); }
  catch(e) {
    isListening = false;
    armWatchdog();
    setTimeout(() => { if (inCall && !isSpeaking) fetchAIReply('[Continue the conversation with a new question.]'); }, 1000);
  }
}

function stopRecognition() {
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
}

// ── Fetch with retry-on-overload ──────────────────────────────────────────────
// Gemini's free tier occasionally returns 503 ("model is currently experiencing
// high demand") or 429 (rate limited). These are almost always transient — a
// short wait and retry usually succeeds. This wrapper retries up to 3 times
// with exponential backoff (1s, 2s, 4s) before giving up. Other errors (auth,
// bad request, etc.) are returned immediately since retrying won't help.
async function fetchWithRetry(url, options, maxAttempts = 3) {
  let lastErr;
  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    try {
      const res = await fetch(url, options);
      // Retry only on transient server-side issues
      if ((res.status === 503 || res.status === 429 || res.status === 502 || res.status === 504) && attempt < maxAttempts) {
        const waitMs = Math.pow(2, attempt - 1) * 1000; // 1s, 2s, 4s
        setPill(`Nova thinking… (retry ${attempt})`, 'listening');
        await new Promise(r => setTimeout(r, waitMs));
        continue;
      }
      return res;
    } catch (err) {
      // Network-level failure (offline, DNS, etc.) — also retry
      lastErr = err;
      if (attempt < maxAttempts) {
        const waitMs = Math.pow(2, attempt - 1) * 1000;
        setPill(`Reconnecting… (${attempt})`, 'listening');
        await new Promise(r => setTimeout(r, waitMs));
        continue;
      }
      throw lastErr;
    }
  }
  // If we exited the loop without returning, throw the last error
  throw lastErr || new Error('All retries exhausted');
}

// ── AI Reply (now parses strict JSON, and ALWAYS recovers on failure) ─────────
async function fetchAIReply(userInput) {
  if (!inCall || isThinking || isSpeaking) return;
  isThinking = true;
  isListening = false;
  lastFailedInput = userInput;
  document.getElementById('avatarInner').className = 'avatar-inner';
  setPill('Thinking…', 'listening');
  setTutorText('<span class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>');
  hideCorrection();
  armWatchdog();

  conversationHistory.push({ role: 'user', content: userInput });
  const msgs = conversationHistory.slice(-8);

  if (BACKEND_URL.includes('YOURNAME')) {
    isThinking = false;
    showToast('Setup needed: open index.html and set BACKEND_URL to your real Worker link.', 'err');
    showRetry();
    return;
  }

  try {
    const res = await fetchWithRetry(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: buildSystem(),
        messages: msgs
      })
    });

    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const rawText = data.content?.find(c => c.type === 'text')?.text?.trim();
    if (!rawText) throw new Error('Empty response');

    const parsed = parseTutorJSON(rawText);
    if (!parsed || !parsed.reply) throw new Error('Bad JSON shape');

    conversationHistory.push({ role: 'assistant', content: JSON.stringify(parsed) });
    isThinking = false;
    lastFailedInput = null;
    clearWatchdog();
    document.getElementById('transText').textContent = selectedLang !== 'English'
      ? `Nova is speaking ${selectedLang}. Listen carefully!`
      : 'Speak naturally — Nova will guide you.';
    renderTurn(parsed);

  } catch (err) {
    isThinking = false;
    console.error('API error:', err);
    showRetry();
    showToast('Nova had trouble responding. Tap retry, or she will continue shortly.', 'err');
    // Soft auto-recovery: don't leave the user stuck forever even if they
    // don't notice the retry button — pick a safe fallback after a pause.
    setTimeout(() => {
      if (inCall && !isSpeaking && !isThinking && !isListening) {
        const fallbacks = [
          `Let's keep going! Tell me, what do you enjoy doing in your free time?`,
          `Interesting! What's your favorite food and why do you like it?`,
          `That's great! Can you describe your neighborhood or city to me?`,
          `Let's try something fun — what is your favorite movie or show?`,
          `I'd love to know — if you could travel anywhere, where would you go?`
        ];
        const fallback = fallbacks[turnCount % fallbacks.length];
        conversationHistory.push({ role: 'assistant', content: JSON.stringify({ reply: fallback, native_translation: '', correction: { has_error:false, original:'', corrected:'', note:'' } }) });
        hideRetry();
        renderTurn({ reply: fallback, native_translation: '', correction: { has_error:false, original:'', corrected:'', note:'' } });
      }
    }, 10000);
  }
}

function parseTutorJSON(raw) {
  let cleaned = raw.trim();
  // Strip accidental markdown fences
  cleaned = cleaned.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '');
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    // Try to salvage a JSON object embedded in extra text
    const match = cleaned.match(/\{[\s\S]*\}/);
    if (match) {
      try { return JSON.parse(match[0]); } catch (e2) { return null; }
    }
    return null;
  }
}

function retryLastTurn() {
  if (!lastFailedInput) { hideRetry(); return; }
  hideRetry();
  const input = lastFailedInput;
  // remove the dangling user turn we already pushed, to avoid duplicates
  if (conversationHistory.length && conversationHistory[conversationHistory.length-1].role === 'user') {
    conversationHistory.pop();
  }
  fetchAIReply(input);
}

function showRetry() { document.getElementById('retryRow').classList.add('show'); setPill('Stuck?', 'error'); }
function hideRetry() { document.getElementById('retryRow').classList.remove('show'); }

// ── Render a tutor turn: speech + correction card + native translation ────────
function renderTurn(parsed) {
  setTutorText(parsed.reply);

  const nl = document.getElementById('nativeLine');
  if (parsed.native_translation && parsed.native_translation.trim()) {
    nl.textContent = parsed.native_translation;
    nl.classList.add('show');
  } else {
    nl.classList.remove('show');
  }

  renderCorrection(parsed.correction);
  speak(parsed.reply);
}

function renderCorrection(corr) {
  const card = document.getElementById('correctionCard');
  if (!corr || !corr.original || !corr.original.trim()) { hideCorrection(); return; }

  const label = document.getElementById('corrLabel');
  const origEl = document.getElementById('corrOriginal');
  const fixedEl = document.getElementById('corrFixed');
  const noteEl = document.getElementById('corrNote');

  if (corr.has_error && corr.corrected) {
    card.classList.add('show', 'has-fix');
    label.textContent = 'Let\'s fix this';
    label.className = 'corr-label fix';
    origEl.textContent = corr.original;
    origEl.className = 'corr-line strike';
    fixedEl.textContent = corr.corrected;
    fixedEl.classList.remove('hidden');
    noteEl.textContent = corr.note || '';
  } else {
    card.classList.add('show');
    card.classList.remove('has-fix');
    label.textContent = 'Nice! Correct';
    label.className = 'corr-label ok';
    origEl.textContent = corr.original;
    origEl.className = 'corr-line good';
    fixedEl.classList.add('hidden');
    noteEl.textContent = corr.note || '';
  }
}

function hideCorrection() {
  document.getElementById('correctionCard').classList.remove('show', 'has-fix');
}

// ── Skip ──────────────────────────────────────────────────────────────────────
function skipTurn() {
  synth.cancel();
  stopRecognition();
  clearWatchdog();
  hideRetry();
  isSpeaking = false; isListening = false; isThinking = false;
  if (inCall) {
    setTimeout(() => fetchAIReply('[User skipped. Move on to a fresh, different conversation topic with a new question.]'), 300);
  }
}

// ── Mute ──────────────────────────────────────────────────────────────────────
function toggleMute() {
  muted = !muted;
  const btn = document.getElementById('muteBtn');
  btn.textContent = muted ? '🔇' : '🎤';
  btn.classList.toggle('muted', muted);
  if (muted) { stopRecognition(); clearWatchdog(); }
  document.getElementById('transText').textContent = muted ? 'Muted — tap mic to unmute.' : 'Speak clearly after Nova finishes.';
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setTutorText(html) { document.getElementById('tutorText').innerHTML = html; }

function showUserSaid(text) {
  document.getElementById('userText').textContent = text;
  document.getElementById('userBubble').classList.remove('hidden');
  document.getElementById('userLabel').classList.remove('hidden');
}

function updateStats() {
  document.getElementById('statWords').textContent = wordCount;
  document.getElementById('statTurns').textContent = turnCount;
}

function setPill(text, cls) {
  const p = document.getElementById('statusPill');
  p.textContent = text;
  p.className = 'status-pill' + (cls ? ' ' + cls : '');
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' '+type : '');
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 4000);
}

// ── Waveform ──────────────────────────────────────────────────────────────────
function startWaveAnim() {
  if (animFrame) cancelAnimationFrame(animFrame);
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);

  function draw() {
    const w = canvas.offsetWidth, h = canvas.offsetHeight;
    ctx.clearRect(0, 0, w, h);
    const active = isSpeaking || isListening;
    const amp = active ? 11 : 2;
    wavePhase += isSpeaking ? 0.08 : isListening ? 0.05 : 0.02;
    ctx.beginPath();
    ctx.strokeStyle = isSpeaking ? '#6c63ff' : isListening ? '#22d3a0' : '#2a2a3a';
    ctx.lineWidth = 2;
    ctx.globalAlpha = active ? 0.85 : 0.35;
    for (let x = 0; x <= w; x++) {
      const y = h/2 + Math.sin((x/w)*Math.PI*4+wavePhase)*amp + Math.sin((x/w)*Math.PI*7+wavePhase*1.4)*(amp*0.45);
      x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke(); ctx.globalAlpha = 1;
    animFrame = requestAnimationFrame(draw);
  }
  draw();
}

function startRingAnim() {
  if (ringFrame) cancelAnimationFrame(ringFrame);
  const canvas = document.getElementById('ringCanvas');
  const ctx = canvas.getContext('2d');
  let angle = 0;
  function draw() {
    if (!inCall) { ctx.clearRect(0,0,130,130); return; }
    ctx.clearRect(0,0,130,130);
    angle += 0.025;
    const active = isSpeaking || isListening;
    const color = isSpeaking ? '#6c63ff' : isListening ? '#22d3a0' : '#2a2a3a';
    const count = active ? 3 : 1;
    for (let i = 0; i < count; i++) {
      const a = angle + (i * Math.PI*2/count);
      ctx.beginPath();
      ctx.arc(65,65,62,a,a+Math.PI*1.3);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.globalAlpha = active ? 0.75 : 0.25;
      ctx.stroke(); ctx.globalAlpha = 1;
    }
    ringFrame = requestAnimationFrame(draw);
  }
  draw();
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.speechSynthesis.onvoiceschanged = () => {};
window.addEventListener('load', () => {
  synth.getVoices();
  startWaveAnim();
  // Register service worker so this site installs as a PWA / wraps into an Android app
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch((err) => console.log('SW registration failed:', err));
  }
});
</script>
