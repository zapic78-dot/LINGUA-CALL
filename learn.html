<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#2563eb" />
<title>Learn English — Lingua Companion AI</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="ico" onclick="location.href='dashboard.html'">‹</button>
    <h1>📖 Learn English</h1>
    <span style="width:24px"></span>
  </header>

  <main class="page">
    <div class="tabs" id="levelTabs">
      <button data-level="beginner" class="active">Beginner</button>
      <button data-level="intermediate">Intermediate</button>
      <button data-level="advanced">Advanced</button>
    </div>

    <div id="lessons"></div>

    <div id="lessonView" style="display:none">
      <button class="btn ghost" id="backToList">‹ Back to lessons</button>
      <div class="card" id="lessonCard"></div>
      <div class="card">
        <h3>Practice with AI</h3>
        <p class="muted">Talk about this topic with your AI companion. The teacher personality will correct your grammar.</p>
        <a class="btn" id="practiceBtn" href="chat.html">💬 Open chat</a>
      </div>
    </div>
  </main>

  <nav class="tabbar" id="tabbar"></nav>
</div>

<script type="module">
  import { $, $$, requireProfile, bottomNav, speak } from "./app.js";
  document.getElementById("tabbar").outerHTML = bottomNav("learn");
  requireProfile();

  const LESSONS = {
    beginner: [
      { t:"Greetings & introductions", body:"Hello. Hi. Good morning. Good afternoon. Good evening.\n\nMy name is Adil. What is your name?\nNice to meet you. Where are you from?\nI am from Pakistan. I live in Kent, Washington.",
        vocab:["hello","name","nice","meet","from","live"] },
      { t:"Numbers, days, months", body:"1 one · 2 two · 3 three · 10 ten · 20 twenty · 100 one hundred.\n\nMonday Tuesday Wednesday Thursday Friday Saturday Sunday.\nJanuary February March April May June July August September October November December.",
        vocab:["one","ten","Monday","January","year","week"] },
      { t:"Daily routines", body:"I wake up at 7 AM.\nI brush my teeth.\nI eat breakfast.\nI go to work.\nI come home at 6 PM.\nI sleep at 11 PM.",
        vocab:["wake up","brush","breakfast","work","sleep","home"] },
      { t:"Asking for directions", body:"Excuse me, where is the bus stop?\nIt is on the corner.\nGo straight. Turn left. Turn right.\nThank you. You're welcome.",
        vocab:["excuse me","where","straight","left","right","corner"] },
      { t:"Family members", body:"This is my family.\nMy father, my mother, my brother, my sister.\nMy son, my daughter, my wife, my husband.\nI have two children.",
        vocab:["father","mother","brother","sister","son","daughter"] }
    ],
    intermediate: [
      { t:"Present perfect tense", body:"Use 'have/has + past participle' for actions connected to now.\n\n• I have lived in the US for 5 years.\n• She has worked here since 2020.\n• They have not finished yet.\n\nQuestion: Have you ever been to New York?",
        vocab:["since","for","ever","never","already","yet"] },
      { t:"Phone calls in English", body:"Hello, this is Adil speaking.\nCan I speak to Sarah, please?\nI'm calling about my appointment.\nCould you repeat that, please?\nCan I leave a message?\nThank you for calling.",
        vocab:["speaking","appointment","repeat","message","calling"] },
      { t:"Job interview basics", body:"Tell me about yourself.\n→ I'm a hard-working person with 5 years of experience in customer service.\n\nWhy do you want this job?\n→ I want to grow my skills and contribute to your team.\n\nWhat are your strengths?\n→ I am reliable, friendly, and a good problem-solver.",
        vocab:["experience","skills","reliable","strengths","weaknesses","team"] },
      { t:"Talking about feelings", body:"I am happy / sad / tired / excited / nervous / proud / worried / grateful.\n\nI feel happy because I passed the test.\nI am tired but proud of my work.\nWhat makes you happy?",
        vocab:["happy","tired","excited","nervous","proud","grateful"] },
      { t:"Making polite requests", body:"Could you help me, please?\nWould you mind closing the window?\nMay I borrow your pen?\nI was wondering if you could…\n\nPolite > Casual: 'Would you' > 'Can you' > 'Give me'.",
        vocab:["could","would","may","please","mind","borrow"] }
    ],
    advanced: [
      { t:"Conditional sentences", body:"Type 1 (real): If it rains, I will stay home.\nType 2 (unreal): If I had more time, I would learn Spanish.\nType 3 (past): If I had studied harder, I would have passed.\n\nMixed: If she were here now, she would have helped earlier.",
        vocab:["unless","provided","were to","would have","could have"] },
      { t:"Business writing", body:"Subject lines should be specific: 'Q3 budget — needs your approval by Friday'.\n\nOpening: I hope this email finds you well.\nMiddle: I'm writing to follow up on…\nClose: Please let me know your thoughts. Looking forward to your reply.\n\nAvoid filler: 'Just', 'I think', 'sorry to bother'.",
        vocab:["follow up","circle back","approve","deliverable","stakeholder","timeline"] },
      { t:"Idioms in conversation", body:"• Hit the books = study hard\n• Break a leg = good luck\n• On the same page = in agreement\n• A piece of cake = very easy\n• Cost an arm and a leg = very expensive\n• Cut to the chase = get to the point",
        vocab:["idiom","figurative","literal","fluent","native","slang"] },
      { t:"Negotiation language", body:"Soft pushback: I see your point, however…\nProposing: What if we tried…?\nRedirecting: Let me come back to that.\nClosing: I think we have a deal.\nWalking away: I'm afraid that won't work for us.",
        vocab:["pushback","proposal","redirect","compromise","leverage","walk away"] },
      { t:"Storytelling at work", body:"Frame: Context → Problem → Action → Result.\n\nExample: Last quarter (context) our churn rose to 8% (problem). I rebuilt the onboarding flow (action) and we cut churn to 4% in 6 weeks (result).\n\nUse specific numbers. Cut adverbs.",
        vocab:["context","churn","onboarding","specific","metric","outcome"] }
    ]
  };

  let level = "beginner";
  function render(){
    const list = LESSONS[level];
    const el = $("#lessons");
    el.innerHTML = list.map((l,i)=>`
      <div class="card" data-i="${i}" style="cursor:pointer">
        <h3>${i+1}. ${l.t}</h3>
        <p class="muted">${l.body.split("\n")[0].slice(0,80)}…</p>
      </div>`).join("");
    el.querySelectorAll(".card").forEach(c=>{
      c.onclick = ()=>openLesson(list[+c.dataset.i]);
    });
  }
  function openLesson(l){
    $("#lessons").style.display="none";
    $("#lessonView").style.display="block";
    $("#lessonCard").innerHTML = `<h3>${l.t}</h3>
      <pre style="white-space:pre-wrap;font-family:inherit;margin:10px 0;line-height:1.6">${escape(l.body)}</pre>
      <button class="btn secondary" id="speakLesson">🔊 Read aloud</button>
      <div class="section-h">Key vocabulary</div>
      <div>${l.vocab.map(v=>`<span class="pill" style="margin:3px 4px 3px 0">${v}</span>`).join("")}</div>`;
    $("#speakLesson").onclick = ()=>speak(l.body);
    localStorage.setItem("learnTopic", l.t);
  }
  function escape(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

  $("#backToList").onclick = ()=>{
    $("#lessons").style.display="block";
    $("#lessonView").style.display="none";
  };

  $$("#levelTabs button").forEach(b=>{
    b.onclick = ()=>{
      $$("#levelTabs button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      level = b.dataset.level;
      render();
    };
  });

  $("#practiceBtn").onclick = ()=>{ localStorage.setItem("persona","teacher"); };

  render();
</script>
</body>
</html>
