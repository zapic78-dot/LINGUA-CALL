<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#2563eb" />
<title>Profile — Lingua</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="ico" onclick="location.href='dashboard.html'">‹</button>
    <h1>👤 Profile</h1>
    <span style="width:24px"></span>
  </header>

  <main class="page">
    <div class="card" style="text-align:center">
      <div class="brand-mark" id="avi" style="width:64px;height:64px;font-size:28px;margin:0 auto 10px"></div>
      <h3 id="pname" style="margin:0">—</h3>
      <p class="muted" id="psub">Member since today</p>
    </div>

    <div class="card">
      <h3>Your stats</h3>
      <div class="row"><span>🔥 Current streak</span><strong id="streak">0 days</strong></div>
      <div class="row"><span>📈 English level</span><strong id="level">Beginner</strong></div>
      <div class="row"><span>🇺🇸 Citizenship score</span><strong id="cscore">0%</strong></div>
      <div class="row"><span>📝 Quizzes completed</span><strong id="totalq">0</strong></div>
    </div>

    <div class="card">
      <h3>Settings</h3>
      <div class="field" style="margin-top:8px">
        <label>Your name</label>
        <input id="nameInput" type="text" />
      </div>
      <div class="field">
        <label>English level</label>
        <select id="levelSel">
          <option>Beginner</option><option>Intermediate</option><option>Advanced</option>
        </select>
      </div>
      <button class="btn" id="saveBtn">Save</button>
    </div>

    <button class="btn danger" id="resetBtn">Reset everything</button>
  </main>

  <nav class="tabbar" id="tabbar"></nav>
</div>

<script type="module">
  import { $, requireProfile, saveProfile, getProfile, toast, bottomNav } from "./app.js";
  document.getElementById("tabbar").outerHTML = bottomNav("profile");

  const p = requireProfile(); if(!p) throw 0;
  $("#avi").textContent = (p.name||"U")[0].toUpperCase();
  $("#pname").textContent = p.name;
  $("#streak").textContent = (p.streak||0)+" days";
  $("#level").textContent = p.englishLevel || "Beginner";
  $("#cscore").textContent = (p.citizenshipScore||0)+"%";
  $("#totalq").textContent = p.totalQuizzes||0;
  $("#nameInput").value = p.name;
  $("#levelSel").value = p.englishLevel || "Beginner";

  $("#saveBtn").onclick = ()=>{
    const name = $("#nameInput").value.trim();
    if(!name) return toast("Name required");
    saveProfile({ name, englishLevel: $("#levelSel").value });
    toast("Saved");
    $("#pname").textContent = name;
    $("#level").textContent = $("#levelSel").value;
    $("#avi").textContent = name[0].toUpperCase();
  };

  $("#resetBtn").onclick = ()=>{
    if(confirm("Erase all progress and start over?")){
      localStorage.clear();
      location.href = "index.html";
    }
  };
</script>
</body>
</html>
